<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Condomínio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f4f8;min-height:100vh}
input,select,button{font-family:inherit;font-size:14px}
select{appearance:none;-webkit-appearance:none}
.fade{animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="app" style="max-width:430px;margin:0 auto;min-height:100vh"></div>
<script>
// Firebase loaded via dynamic import for global scope compatibility
let initializeApp, getDatabase, ref, set, get, onValue, update, remove;

const app=initializeApp({
  apiKey:"AIzaSyDKqdGqPDHpbeOjChWjxg453g9xUNo_bZE",
  authDomain:"cond-ce038.firebaseapp.com",
  databaseURL:"https://cond-ce038-default-rtdb.firebaseio.com",
  projectId:"cond-ce038",
  storageBucket:"cond-ce038.firebasestorage.app",
  messagingSenderId:"797254652697",
  appId:"1:797254652697:web:9e790186009dbda2c02b88"
});
const db=getDatabase(app);

// ── CONSTANTES ──────────────────────────────────────
const MO=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
const MF=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const CATS={luz:"⚡ Luz",agua:"💧 Água",manutencao:"🔧 Manutenção",limpeza:"🧹 Limpeza",seguranca:"🔒 Segurança",outros:"📦 Outros"};
const CATC={luz:"#eab308",agua:"#06b6d4",manutencao:"#10b981",limpeza:"#3b82f6",seguranca:"#8b5cf6",outros:"#94a3b8"};

// ── ESTADO GLOBAL ───────────────────────────────────
let ST={
  tela:"home",
  user:null,
  users:[],
  cfg:{nomeCondominio:"",endereco:"",ano:2025,taxaMensal:50,saldoCaixa:0},
  apts:[],
  pay:{},
  desp:[],
  loading:true,
  toast:null,
  modal:null,
  // sub-estados de formulários
  aptForm:null,       // null=fechado, {}=aberto
  despForm:null,      // null=fechado, {}=aberto
  despEditId:null,
  cfgTab:"geral",
  aptEditId:null,
  userEditId:null,
  selAptId:null,
  selMes:null,
};

// ── FIREBASE ─────────────────────────────────────────
const fbSet=(p,v)=>set(ref(db,p),v);
const fbUpd=(p,v)=>update(ref(db,p),v);
const fbDel=(p)=>remove(ref(db,p));

async function iniciar(){
  try{
    const snap=await get(ref(db,"_init"));
    if(!snap.exists()){
      await fbSet("users",{
        1:{id:1,nome:"Síndico",login:"sindico",senha:"1234",role:"sindico"},
        2:{id:2,nome:"Subsíndico",login:"subsindico",senha:"1234",role:"subsindico"}
      });
      await fbSet("cfg",{nomeCondominio:"",endereco:"",ano:2025,taxaMensal:50,saldoCaixa:0});
      const ao={};
      ["101","102","103","104","105","106"].forEach(n=>{ao[n]={id:n,numero:n,morador:"",telefone:"",email:"",ativo:true};});
      await fbSet("apts",ao);
      const po={};
      ["101","102","103","104","105","106"].forEach(n=>{po[n]={};MO.forEach(m=>{po[n][m]={pago:false,data:""};});});
      await fbSet("pay",po);
      await fbSet("_init",true);
    }
    // Sessão local
    try{const s=sessionStorage.getItem("u");if(s)ST.user=JSON.parse(s);}catch{}
    // Listeners
    onValue(ref(db,"users"),s=>{ST.users=s.val()?Object.values(s.val()):[];pintar();});
    onValue(ref(db,"cfg"),s=>{if(s.val())ST.cfg={...ST.cfg,...s.val()};pintar();});
    onValue(ref(db,"apts"),s=>{ST.apts=s.val()?Object.values(s.val()).filter(a=>a.ativo):[];pintar();});
    onValue(ref(db,"pay"),s=>{ST.pay=s.val()||{};pintar();});
    onValue(ref(db,"desp"),s=>{ST.desp=s.val()?Object.values(s.val()).sort((a,b)=>b.id-a.id):[];pintar();});
    ST.loading=false;pintar();
  }catch(e){
    console.error(e);
    ST.loading=false;pintar();
  }
}
(async function(){
  const fbApp = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const fbDb = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
  initializeApp = fbApp.initializeApp;
  getDatabase = fbDb.getDatabase;
  ref = fbDb.ref;
  set = fbDb.set;
  get = fbDb.get;
  onValue = fbDb.onValue;
  update = fbDb.update;
  remove = fbDb.remove;
  iniciar();
})();

// ── HELPERS ───────────────────────────────────────────
function fmt(n){return(+n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function hoje(){const d=new Date();return`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;}
function isoParaBr(s){if(!s)return"";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;}
function brParaIso(s){if(!s)return"";const[d,m,y]=s.split("/");return`${y}-${m}-${d}`;}
function mesDoIso(s){if(!s)return MO[new Date().getMonth()];return MO[parseInt(s.split("-")[1])-1]||MO[new Date().getMonth()];}
function pctApt(id){let p=0;MO.forEach(m=>{if(ST.pay[id]?.[m]?.pago)p++;});return Math.round(p/12*100);}
function pctMes(m){if(!ST.apts.length)return 0;return Math.round(ST.apts.filter(a=>ST.pay[a.id]?.[m]?.pago).length/ST.apts.length*100);}
function totalArr(){let t=0;const tx=+ST.cfg.taxaMensal||0;ST.apts.forEach(a=>MO.forEach(m=>{if(ST.pay[a.id]?.[m]?.pago)t+=tx;}));return t;}
function totalDespPagas(){return ST.desp.filter(d=>d.pago).reduce((s,d)=>s+(+d.valor||0),0);}
function aptById(id){return ST.apts.find(a=>a.id===id)||null;}
function userById(id){return ST.users.find(u=>u.id===id)||null;}

// ── TOAST ─────────────────────────────────────────────
let _tt;
function toast(msg,tipo="ok"){
  clearTimeout(_tt);ST.toast={msg,tipo};pintar();
  _tt=setTimeout(()=>{ST.toast=null;pintar();},2500);
}

// ── AÇÕES ─────────────────────────────────────────────
window.irPara=function(tela){ST.tela=tela;ST.aptForm=null;ST.despForm=null;ST.despEditId=null;pintar();}
window.voltar=function(){ST.tela=ST.tela==="apt_d"?"apts":"meses";pintar();}
window.sair=function(){try{sessionStorage.removeItem("u");}catch{}ST.user=null;ST.tela="home";pintar();}

window.fazerLogin=function(){
  const u=document.getElementById("fu")?.value?.trim()||"";
  const s=document.getElementById("fs")?.value||"";
  const found=ST.users.find(x=>x.login===u&&x.senha===s);
  if(found){
    ST.user=found;
    try{sessionStorage.setItem("u",JSON.stringify(found));}catch{}
    ST.tela="home";pintar();toast("Bem-vindo, "+found.nome+"!");
  } else {
    const e=document.getElementById("ferr");
    if(e){e.style.display="block";e.textContent="⚠️ Login ou senha incorretos.";}
  }
}

window.marcarPagamento=async function(aptId,mes){
  const cur=ST.pay[aptId]?.[mes]?.pago||false;
  const tx=+ST.cfg.taxaMensal||0;
  const novoSaldo=(+ST.cfg.saldoCaixa||0)+(!cur?tx:-tx);
  await fbUpd("pay/"+aptId+"/"+mes,{pago:!cur,data:!cur?hoje():""});
  await fbUpd("cfg",{saldoCaixa:novoSaldo});
  toast(!cur?"✅ Pago! Saldo atualizado.":"Pagamento desmarcado");
}

window.abrirApt=function(id){ST.selAptId=id;ST.tela="apt_d";pintar();}
window.abrirMes=function(i){ST.selMes=i;ST.tela="mes_d";pintar();}

window.toggleFormApt=function(){
  ST.aptForm=ST.aptForm?null:{numero:"",morador:"",telefone:"",email:""};pintar();
}
window.cancelarFormApt=function(){ST.aptForm=null;pintar();}
window.salvarNovoApt=async function(){
  const n=(document.getElementById("an")?.value||"").trim();
  if(!n){toast("Informe o número","err");return;}
  if(ST.apts.find(a=>a.id===n)){toast("Apartamento já existe","err");return;}
  const novo={id:n,numero:n,
    morador:document.getElementById("am")?.value||"",
    telefone:document.getElementById("at")?.value||"",
    email:document.getElementById("ae")?.value||"",
    ativo:true};
  const po={};MO.forEach(m=>{po[m]={pago:false,data:""};});
  await fbSet("apts/"+n,novo);
  await fbSet("pay/"+n,po);
  ST.aptForm=null;toast("Apt "+n+" adicionado!");
}

window.abrirEditApt=function(id){ST.aptEditId=id;ST.cfgTab="apts";pintar();}
window.cancelarEditApt=function(){ST.aptEditId=null;pintar();}
window.salvarEditApt=async function(){
  const a=aptById(ST.aptEditId);if(!a)return;
  const upd={...a,
    numero:document.getElementById("ean")?.value||a.numero,
    morador:document.getElementById("eam")?.value||"",
    telefone:document.getElementById("eat")?.value||"",
    email:document.getElementById("eae")?.value||""};
  await fbSet("apts/"+upd.id,upd);
  ST.aptEditId=null;toast("✓ Apartamento salvo!");
}
window.confirmarRemoverApt=function(id){
  const a=aptById(id);if(!a)return;
  ST.modal={titulo:"Remover Apt "+a.numero+"?",msg:"Os pagamentos também serão removidos.",
    cor:"#ef4444",label:"Remover",acao:"removerApt('"+id+"')"};pintar();
}
window.removerApt=async function(id){
  await fbUpd("apts/"+id,{ativo:false});
  await fbDel("pay/"+id);
  ST.modal=null;toast("Apartamento removido");
}

window.abrirEditUser=function(id){ST.userEditId=id;ST.cfgTab="usuarios";pintar();}
window.cancelarEditUser=function(){ST.userEditId=null;pintar();}
window.salvarEditUser=async function(){
  const u=userById(ST.userEditId);if(!u)return;
  const nome=document.getElementById("eun")?.value||"";
  const login=document.getElementById("eul")?.value||"";
  const senha=document.getElementById("eus")?.value||"";
  const role=document.getElementById("eur")?.value||"sindico";
  if(!nome||!login||!senha){toast("Preencha todos os campos","err");return;}
  const upd={...u,nome,login,senha,role};
  await fbSet("users/"+u.id,upd);
  if(ST.user?.id===u.id){ST.user=upd;try{sessionStorage.setItem("u",JSON.stringify(upd));}catch{}}
  ST.userEditId=null;toast("✓ Usuário salvo!");
}

window.mudarCfgTab=function(t){ST.cfgTab=t;ST.aptEditId=null;ST.userEditId=null;pintar();}

window.salvarCfgGeral=async function(){
  const upd={...ST.cfg,
    nomeCondominio:document.getElementById("cn")?.value||"",
    endereco:document.getElementById("ce")?.value||"",
    ano:document.getElementById("ca")?.value||2025};
  await fbSet("cfg",upd);toast("✓ Configurações salvas!");
}
window.salvarTaxa=async function(){
  const tx=parseFloat(document.getElementById("ct")?.value)||50;
  await fbUpd("cfg",{taxaMensal:tx});toast("✓ Taxa salva!");
}
window.abrirAjusteSaldo=function(){ST.modal={tipo:"saldo"};pintar();}
window.salvarSaldo=async function(){
  const v=parseFloat(document.getElementById("mvs")?.value)||0;
  await fbUpd("cfg",{saldoCaixa:v});
  ST.modal=null;toast("✓ Saldo atualizado!");
}
window.fecharModal=function(){ST.modal=null;pintar();}
window.confirmarReset=function(){
  ST.modal={titulo:"Zerar todos os dados?",msg:"Pagamentos, despesas e saldo serão apagados.",
    cor:"#ef4444",label:"Zerar tudo",acao:"executarReset()"};pintar();
}
window.executarReset=async function(){
  const po={};ST.apts.forEach(a=>{po[a.id]={};MO.forEach(m=>{po[a.id][m]={pago:false,data:""};});});
  await fbSet("pay",po);
  await fbDel("desp");
  await fbUpd("cfg",{saldoCaixa:0});
  ST.modal=null;toast("Dados zerados!");
}

window.toggleFormDesp=function(){
  if(ST.despForm){ST.despForm=null;ST.despEditId=null;}
  else{ST.despForm={desc:"",valor:"",data:hoje(),cat:"luz",obs:""};ST.despEditId=null;}
  pintar();
}
window.cancelarFormDesp=function(){ST.despForm=null;ST.despEditId=null;pintar();}
window.salvarDesp=async function(){
  const desc=(document.getElementById("dd")?.value||"").trim();
  const val=document.getElementById("dv")?.value||"";
  if(!desc||!val){toast("Preencha descrição e valor","err");return;}
  const dtISO=document.getElementById("ddt")?.value||"";
  const dt=isoParaBr(dtISO)||hoje();
  const mes=mesDoIso(dtISO);
  const f={desc,valor:parseFloat(val),data:dt,mes,
    cat:document.getElementById("dc")?.value||"luz",
    obs:document.getElementById("dob")?.value||""};
  if(ST.despEditId){
    const old=ST.desp.find(d=>String(d.id)===String(ST.despEditId));
    let ns=+ST.cfg.saldoCaixa||0;
    if(old?.pago){ns+=+old.valor;ns-=f.valor;}
    await fbUpd("desp/"+ST.despEditId,f);
    if(old?.pago)await fbUpd("cfg",{saldoCaixa:ns});
    toast("✓ Despesa atualizada!");
  }else{
    const id=Date.now();
    await fbSet("desp/"+id,{...f,id,pago:false});
    toast("Despesa adicionada!");
  }
  ST.despForm=null;ST.despEditId=null;pintar();
}
window.editarDesp=function(id){
  const d=ST.desp.find(d=>String(d.id)===String(id));if(!d)return;
  ST.despEditId=id;
  ST.despForm={desc:d.desc,valor:String(d.valor),data:d.data||hoje(),cat:d.cat,obs:d.obs||""};
  pintar();setTimeout(()=>document.getElementById("dd")?.focus(),100);
}
window.pagarDesp=async function(id){
  const d=ST.desp.find(d=>String(d.id)===String(id));if(!d)return;
  const ns=(+ST.cfg.saldoCaixa||0)+(d.pago?+d.valor:-(+d.valor));
  await fbUpd("desp/"+id,{pago:!d.pago});
  await fbUpd("cfg",{saldoCaixa:ns});
  toast(d.pago?"Despesa desmarcada":"💸 Pago! Saldo atualizado.");
}
window.confirmarDelDesp=function(id){
  ST.modal={titulo:"Excluir despesa?",msg:"Esta ação não pode ser desfeita.",
    cor:"#ef4444",label:"Excluir",acao:"deletarDesp('"+id+"')"};pintar();
}
window.deletarDesp=async function(id){
  const d=ST.desp.find(d=>String(d.id)===String(id));
  const ns=d?.pago?(+ST.cfg.saldoCaixa||0)+(+d.valor):+ST.cfg.saldoCaixa||0;
  await fbDel("desp/"+id);
  if(d?.pago)await fbUpd("cfg",{saldoCaixa:ns});
  ST.modal=null;toast("Despesa removida");
}
window.executarAcaoModal=function(){
  const a=ST.modal?.acao;if(a)eval(a);
}

// ── CSS HELPERS ───────────────────────────────────────
const I="width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 14px;font-size:14px;background:#fff;color:#1e293b;box-sizing:border-box;";
const BTN=(bg,c="#fff",w="100%")=>`background:${bg};color:${c};border:none;border-radius:13px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;width:${w};`;
const CARD=(b="#e2e8f0",bg="#fff")=>`background:${bg};border:1.5px solid ${b};border-radius:16px;padding:14px;margin-bottom:10px;`;
const LBL="font-size:11px;font-weight:700;color:#64748b;letter-spacing:.8px;margin-bottom:5px;display:block;";
const BADGE=(bg,c)=>`background:${bg};color:${c};font-size:10px;font-weight:700;border-radius:20px;padding:3px 9px;display:inline-block;`;

// ── RENDER PRINCIPAL ──────────────────────────────────
function pintar(){
  const el=document.getElementById("app");if(!el)return;
  if(ST.loading){
    el.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px"><div style="font-size:48px">🏢</div><div style="color:#64748b;font-weight:600;font-size:16px">Conectando...</div></div>`;
    return;
  }
  if(!ST.user){el.innerHTML=telaLogin();return;}
  el.innerHTML=`
    ${renderToast()}
    ${renderVoltar()}
    <div style="padding-bottom:76px">${renderTela()}</div>
    ${renderNav()}
    ${renderModal()}
  `;
}

function renderToast(){
  if(!ST.toast)return"";
  return`<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);background:${ST.toast.tipo==="err"?"#ef4444":"#1e293b"};color:#fff;border-radius:24px;padding:10px 22px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;pointer-events:none">${ST.toast.msg}</div>`;
}

function renderVoltar(){
  if(!["apt_d","mes_d"].includes(ST.tela))return"";
  return`<button onclick="voltar()" style="position:fixed;top:14px;left:14px;z-index:80;background:#fff;border:none;border-radius:20px;padding:7px 16px 7px 10px;font-size:14px;font-weight:700;color:#1e293b;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.15)">‹ Voltar</button>`;
}

function renderNav(){
  const ac=ST.tela==="apt_d"?"apts":ST.tela==="mes_d"?"meses":ST.tela;
  const itens=[["home","🏠","Início"],["apts","🚪","Apts"],["meses","📅","Meses"],["desp","💰","Gastos"],["cfg","⚙️","Config"]];
  return`<div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1.5px solid #e2e8f0;display:flex;z-index:70;padding-bottom:env(safe-area-inset-bottom,0)">
    ${itens.map(([id,e,l])=>`
    <button onclick="irPara('${id}')" style="flex:1;background:none;border:none;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer">
      <span style="font-size:20px">${e}</span>
      <span style="font-size:10px;font-weight:${ac===id?700:500};color:${ac===id?"#2563eb":"#94a3b8"}">${l}</span>
      ${ac===id?`<div style="width:4px;height:4px;background:#2563eb;border-radius:99px"></div>`:""}
    </button>`).join("")}
  </div>`;
}

function renderModal(){
  if(!ST.modal)return"";
  if(ST.modal.tipo==="saldo"){
    return`<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px">
      <div style="background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px">
        <div style="font-size:28px;text-align:center;margin-bottom:8px">💰</div>
        <div style="font-weight:800;font-size:16px;color:#1e293b;margin-bottom:4px;text-align:center">Ajustar Saldo em Caixa</div>
        <div style="color:#64748b;font-size:13px;margin-bottom:16px;text-align:center">Atual: <b>R$ ${fmt(ST.cfg.saldoCaixa)}</b></div>
        <label style="${LBL}">NOVO SALDO (R$)</label>
        <input id="mvs" type="number" min="0" step="0.01" style="${I}margin-bottom:16px" value="${+ST.cfg.saldoCaixa||0}">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <button onclick="fecharModal()" style="${BTN("#e2e8f0","#64748b")}">Cancelar</button>
          <button onclick="salvarSaldo()" style="${BTN("#2563eb")}">Salvar</button>
        </div>
      </div>
    </div>`;
  }
  return`<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px">
    <div style="background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px">
      <div style="font-size:28px;text-align:center;margin-bottom:8px">⚠️</div>
      <div style="font-weight:800;font-size:16px;color:#1e293b;margin-bottom:8px;text-align:center">${ST.modal.titulo}</div>
      <div style="color:#64748b;font-size:14px;margin-bottom:20px;text-align:center">${ST.modal.msg}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button onclick="fecharModal()" style="${BTN("#e2e8f0","#64748b")}">Cancelar</button>
        <button onclick="executarAcaoModal()" style="${BTN(ST.modal.cor||"#ef4444")}">${ST.modal.label}</button>
      </div>
    </div>
  </div>`;
}

function renderTela(){
  switch(ST.tela){
    case"home":return telaHome();
    case"apts":return telaApts();
    case"apt_d":return telaAptD();
    case"meses":return telaMeses();
    case"mes_d":return telaMesD();
    case"desp":return telaDesp();
    case"cfg":return telaCfg();
    default:return telaHome();
  }
}

// ── LOGIN ──────────────────────────────────────────────
function telaLogin(){
  return`<div style="min-height:100vh;background:linear-gradient(160deg,#0f172a,#1e3a5f,#2563eb);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:72px;height:72px;background:rgba(255,255,255,.1);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 14px;border:1.5px solid rgba(255,255,255,.2)">🏢</div>
      <div style="color:rgba(255,255,255,.5);font-size:11px;font-weight:700;letter-spacing:2px;margin-bottom:4px">SISTEMA DE GESTÃO</div>

        </select>
      </div>
      <div style="margin-bottom:14px"><label style="${LBL}">OBSERVAÇÕES</label><input id="dob" style="${I}" placeholder="Ex: Nº nota fiscal..." value="${f.obs||""}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button onclick="cancelarFormDesp()" style="${BTN("#e2e8f0","#64748b")}">Cancelar</button>
        <button onclick="salvarDesp()" style="${BTN("#f59e0b")}">${ST.despEditId?"Salvar":"Adicionar"}</button>
      </div>
    </div>`:""}
    ${fil.length===0?`<div style="text-align:center;color:#94a3b8;padding:32px;background:#fff;border-radius:16px"><div style="font-size:32px;margin-bottom:8px">💰</div><div>Nenhuma despesa${despFiltro!=="Todos"?" em "+despFiltro:""}.</div></div>`:""}
    ${fil.map(d=>{
      const cc=CATC[d.cat]||"#94a3b8";
      return`<div style="${CARD()}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div style="flex:1;margin-right:10px">
            <div style="font-weight:700;color:#1e293b;font-size:14px">${d.desc}</div>
            <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
              <span style="${BADGE(cc+"22",cc)}">${CATS[d.cat]||d.cat}</span>
              <span style="${BADGE("#f1f5f9","#64748b")}">${d.mes}</span>
              ${d.data?`<span style="${BADGE("#f1f5f9","#64748b")}">📅 ${d.data}</span>`:""}
            </div>
            ${d.obs?`<div style="font-size:12px;color:#94a3b8;margin-top:5px">📝 ${d.obs}</div>`:""}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-weight:800;color:#1e293b;font-size:15px">R$ ${fmt(d.valor)}</div>
            <button onclick="pagarDesp('${d.id}')" style="margin-top:6px;background:${d.pago?"#dcfce7":"#fee2e2"};color:${d.pago?"#16a34a":"#dc2626"};border:none;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer">${d.pago?"✓ Pago":"Pendente"}</button>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="editarDesp('${d.id}')" style="flex:1;background:#f1f5f9;color:#374151;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:600;cursor:pointer">✏️ Editar</button>
          <button onclick="confirmarDelDesp('${d.id}')" style="flex:1;background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:600;cursor:pointer">🗑 Excluir</button>
        </div>
      </div>`;
    }).join("")}
  </div></div>`;
}

// ── CONFIGURAÇÕES ──────────────────────────────────────
function telaCfg(){
  const tab=ST.cfgTab;
  const TABS=[["geral","⚙️ Geral"],["taxas","💲 Taxa"],["apts","🚪 Apts"],["usuarios","👤 Usuários"],["dados","🗂 Dados"]];
  return`<div class="fade" style="padding:0 0 20px">
  <div style="background:linear-gradient(135deg,#1e293b,#334155);padding:20px 16px 24px;border-radius:0 0 24px 24px;margin-bottom:16px">
    <div style="color:#94a3b8;font-size:11px;font-weight:700;letter-spacing:1px">CONFIGURAÇÕES</div>
    <div style="color:#fff;font-size:20px;font-weight:900">Sistema</div>
  </div>
  <div style="display:flex;gap:6px;overflow-x:auto;padding:0 16px 12px">
    ${TABS.map(([id,l])=>`<button onclick="mudarCfgTab('${id}')" style="background:${tab===id?"#1e293b":"#f1f5f9"};color:${tab===id?"#fff":"#374151"};border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0">${l}</button>`).join("")}
  </div>
  <div style="padding:0 16px">
  ${tab==="geral"?`
    <div style="margin-bottom:14px"><label style="${LBL}">NOME DO CONDOMÍNIO</label><input id="cn" style="${I}" value="${ST.cfg.nomeCondominio||""}" placeholder="Ex: Residencial das Flores"></div>
    <div style="margin-bottom:14px"><label style="${LBL}">ENDEREÇO</label><input id="ce" style="${I}" value="${ST.cfg.endereco||""}" placeholder="Ex: Rua das Acácias, 123"></div>
    <div style="margin-bottom:14px"><label style="${LBL}">ANO</label><input id="ca" type="number" style="${I}" value="${ST.cfg.ano||2025}"></div>
    <button onclick="salvarCfgGeral()" style="${BTN("#1e293b")}">Salvar Configurações</button>`:""}
  ${tab==="taxas"?`
    <div style="${CARD("#bfdbfe","#eff6ff")}margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:#1e3a5f">💡 Taxa mensal por apartamento. Ao marcar pagamento o valor é somado ao saldo automaticamente.</div></div>
    <div style="margin-bottom:14px"><label style="${LBL}">TAXA MENSAL POR APARTAMENTO (R$)</label><input id="ct" type="number" min="0" step="0.01" style="${I}" value="${ST.cfg.taxaMensal||50}"></div>
    <div style="${CARD("#bbf7d0","#f0fdf4")}margin-bottom:16px">
      <div style="color:#64748b;font-size:12px">Por apartamento/mês:</div>
      <div style="font-weight:900;font-size:28px;color:#16a34a">R$ ${fmt(ST.cfg.taxaMensal||50)}</div>
      <div style="color:#64748b;font-size:12px;margin-top:4px">Potencial anual (${ST.apts.length} apts): <b>R$ ${fmt((+ST.cfg.taxaMensal||50)*ST.apts.length*12)}</b></div>
    </div>
    <button onclick="salvarTaxa()" style="${BTN("#16a34a")}">Salvar Taxa</button>`:""}
  ${tab==="apts"?renderCfgApts():""}
  ${tab==="usuarios"?renderCfgUsuarios():""}
  ${tab==="dados"?`
    <div style="${CARD("#bbf7d0","#f0fdf4")}margin-bottom:12px">
      <div style="font-weight:700;color:#065f46;margin-bottom:4px">🔄 Sincronização em tempo real</div>
      <div style="font-size:13px;color:#047857">Dados sincronizados entre todos os dispositivos via Firebase.</div>
    </div>
    <div style="${CARD()}margin-bottom:12px">
      <div style="font-weight:700;color:#1e293b;margin-bottom:4px">🚪 Sair do sistema</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:12px">Encerra a sessão atual.</div>
      <button onclick="sair()" style="${BTN("#475569")}">Sair do Sistema</button>
    </div>
    <div style="${CARD("#fecaca","#fff5f5")}">
      <div style="font-weight:700;color:#991b1b;margin-bottom:4px">⚠️ Zerar Dados</div>
      <div style="font-size:13px;color:#7f1d1d;margin-bottom:12px">Remove pagamentos, despesas e zera o saldo.</div>
      <button onclick="confirmarReset()" style="${BTN("#ef4444")}">Zerar Dados</button>
    </div>`:""}
  </div></div>`;
}

function renderCfgApts(){
  const editId=ST.aptEditId;
  if(editId){
    const a=aptById(editId);if(!a)return"";
    return`<div style="${CARD("#bfdbfe","#eff6ff")}">
      <div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando Apt ${a.numero}</div>
      <div style="margin-bottom:10px"><label style="${LBL}">NÚMERO</label><input id="ean" style="${I}" value="${a.numero}"></div>
      <div style="margin-bottom:10px"><label style="${LBL}">MORADOR</label><input id="eam" style="${I}" value="${a.morador||""}"></div>
      <div style="margin-bottom:10px"><label style="${LBL}">TELEFONE</label><input id="eat" style="${I}" value="${a.telefone||""}"></div>
      <div style="margin-bottom:10px"><label style="${LBL}">E-MAIL</label><input id="eae" style="${I}" value="${a.email||""}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
        <button onclick="cancelarEditApt()" style="${BTN("#e2e8f0","#64748b")}">Cancelar</button>
        <button onclick="salvarEditApt()" style="${BTN("#2563eb")}">Salvar</button>
      </div>
    </div>`;
  }
  return`
    ${ST.apts.map(a=>`
    <div style="${CARD()}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:800;color:#1e293b;font-size:15px">Apt ${a.numero}</div>
          <div style="font-size:13px;color:${a.morador?"#374151":"#cbd5e1"};font-style:${a.morador?"normal":"italic"}">${a.morador||"Sem morador"}</div>
          ${a.telefone?`<div style="font-size:12px;color:#64748b">${a.telefone}</div>`:""}
        </div>
        <div style="display:flex;gap:6px">
          <button onclick="abrirEditApt('${a.id}')" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer">✏️</button>
          <button onclick="confirmarRemoverApt('${a.id}')" style="background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer">🗑</button>
        </div>
      </div>
    </div>`).join("")}
    ${ST.apts.length===0?`<div style="text-align:center;color:#94a3b8;padding:24px">Nenhum apartamento.</div>`:""}`;
}

function renderCfgUsuarios(){
  const editId=ST.userEditId;
  if(editId){
    const u=userById(editId);if(!u)return"";
    return`<div style="${CARD("#ddd6fe","#faf5ff")}">
      <div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando: ${u.nome}</div>
      <div style="margin-bottom:10px"><label style="${LBL}">NOME</label><input id="eun" style="${I}" value="${u.nome}"></div>
      <div style="margin-bottom:10px"><label style="${LBL}">LOGIN</label><input id="eul" style="${I}" value="${u.login}" autocapitalize="none"></div>
      <div style="margin-bottom:10px"><label style="${LBL}">SENHA</label><input id="eus" type="password" style="${I}" value="${u.senha}"></div>
      <div style="margin-bottom:14px"><label style="${LBL}">FUNÇÃO</label>
        <select id="eur" style="${I}padding:12px 28px 12px 14px;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22%3E%3Cpath fill=%22%2364748b%22 d=%22M6 8L1 3h10z%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center">
          <option value="sindico"${u.role==="sindico"?" selected":""}>Síndico</option>
          <option value="subsindico"${u.role==="subsindico"?" selected":""}>Subsíndico</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button onclick="cancelarEditUser()" style="${BTN("#e2e8f0","#64748b")}">Cancelar</button>
        <button onclick="salvarEditUser()" style="${BTN("#7c3aed")}">Salvar</button>
      </div>
    </div>`;
  }
  return`
    ${ST.users.map(u=>`
    <div style="${CARD()}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:800;color:#1e293b">${u.nome}</div>
          <div style="font-size:12px;color:#64748b">Login: <b>${u.login}</b> · ${u.role==="sindico"?"Síndico":"Subsíndico"}</div>
        </div>
        <button onclick="abrirEditUser(${u.id})" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer">✏️ Editar</button>
      </div>
    </div>`).join("")}`;
}

</script>
</body>
</html>
