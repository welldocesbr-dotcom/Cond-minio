<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>CondoGest Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f4f8;min-height:100vh}
input,select,button,textarea{font-family:inherit;font-size:14px}
select{appearance:none;-webkit-appearance:none}
textarea{resize:none}
.fade{animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div id="app" style="max-width:430px;margin:0 auto;min-height:100vh">
<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px">
<div style="font-size:48px">🏢</div>
<div style="color:#64748b;font-weight:600;font-size:16px">Conectando...</div>
</div>
</div>
<script>
// ── FIREBASE ──────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyDKqdGqPDHpbeOjChWjxg453g9xUNo_bZE",
  authDomain:"cond-ce038.firebaseapp.com",
  databaseURL:"https://cond-ce038-default-rtdb.firebaseio.com",
  projectId:"cond-ce038",
  storageBucket:"cond-ce038.firebasestorage.app",
  messagingSenderId:"797254652697",
  appId:"1:797254652697:web:9e790186009dbda2c02b88"
});
var db = firebase.database();
function fbSet(p,v){return db.ref(p).set(v);}
function fbUpd(p,v){return db.ref(p).update(v);}
function fbDel(p){return db.ref(p).remove();}
function fbOn(p,cb){db.ref(p).on("value",function(s){cb(s.val());});}
function fbGet(p){return db.ref(p).once("value");}

// ── CONSTANTES ────────────────────────────────────────
var ANO = new Date().getFullYear();
var MO = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
var MF = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var CATS = {luz:"⚡ Luz",agua:"💧 Água",manutencao:"🔧 Manutenção",limpeza:"🧹 Limpeza",seguranca:"🔒 Segurança",outros:"📦 Outros"};
var CATC = {luz:"#eab308",agua:"#06b6d4",manutencao:"#10b981",limpeza:"#3b82f6",seguranca:"#8b5cf6",outros:"#94a3b8"};

// ── ESTADO ────────────────────────────────────────────
var ST = {
  tela:"home", user:null, users:[], apts:[], blocos:[], pay:{}, desp:[], avisos:[],
  cfg:{nomeCondominio:"",endereco:"",ano:ANO,taxaMensal:50,saldoCaixa:0,usaBlocos:false},
  loading:true, toast:null, modal:null,
  selAptId:null, selMes:null, selAno:ANO,
  aptForm:false, aptEditId:null,
  despForm:false, despEditId:null, despFiltro:"Todos",
  avisoForm:false, avisoFiltro:"todos",
  cfgTab:"geral", blocoEditId:null, userEditId:null,
  blocoFiltro:""
};

// ── HELPERS ───────────────────────────────────────────
function fmt(n){return(+n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function hoje(){var d=new Date();return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function pad(n){return n<10?"0"+n:String(n);}
function isoToBr(s){if(!s)return"";var p=s.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function brToIso(s){if(!s)return"";var p=s.split("/");return p[2]+"-"+p[1]+"-"+p[0];}
function mesDoIso(s){if(!s)return MO[new Date().getMonth()];return MO[parseInt(s.split("-")[1])-1]||MO[new Date().getMonth()];}
function gv(id){var el=document.getElementById(id);return el?el.value:"";}
function aptById(id){return ST.apts.find(function(a){return a.id===id;})||null;}
function userById(id){return ST.users.find(function(u){return u.id===id;})||null;}
function blocoById(id){return ST.blocos.find(function(b){return b.id===id;})||null;}
function nomeBloco(id){var b=blocoById(id);return b?b.nome:"";}
function telLimpo(t){return(t||"").replace(/[^0-9]/g,"");}

function pctApt(id){
  var p=0;
  MO.forEach(function(m){if(ST.pay[ST.selAno]&&ST.pay[ST.selAno][id]&&ST.pay[ST.selAno][id][m]&&ST.pay[ST.selAno][id][m].pago)p++;});
  return Math.round(p/12*100);
}
function pctMes(m){
  if(!ST.apts.length)return 0;
  var pago=ST.apts.filter(function(a){return ST.pay[ST.selAno]&&ST.pay[ST.selAno][a.id]&&ST.pay[ST.selAno][a.id][m]&&ST.pay[ST.selAno][a.id][m].pago;}).length;
  return Math.round(pago/ST.apts.length*100);
}
function totalArr(){
  var t=0; var tx=+ST.cfg.taxaMensal||0;
  ST.apts.forEach(function(a){MO.forEach(function(m){if(ST.pay[ST.selAno]&&ST.pay[ST.selAno][a.id]&&ST.pay[ST.selAno][a.id][m]&&ST.pay[ST.selAno][a.id][m].pago)t+=tx;});});
  return t;
}
function totalDespPagas(){
  return ST.desp.filter(function(d){return d.pago&&String(d.ano||ANO)===String(ST.selAno);}).reduce(function(s,d){return s+(+d.valor||0);},0);
}

// ── TOAST ─────────────────────────────────────────────
var _tt;
function toast(msg,tipo){
  clearTimeout(_tt);
  ST.toast={msg:msg,tipo:tipo||"ok"};
  pintar();
  _tt=setTimeout(function(){ST.toast=null;pintar();},2500);
}

// ── CSS ───────────────────────────────────────────────
var SVG_ARROW = "url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22%3E%3Cpath fill=%22%2364748b%22 d=%22M6 8L1 3h10z%22/%3E%3C/svg%3E')";
function stI(){return "width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 14px;font-size:14px;background:#fff;color:#1e293b;box-sizing:border-box;";}
function stB(bg,c,w){return "background:"+(bg||"#2563eb")+";color:"+(c||"#fff")+";border:none;border-radius:13px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;width:"+(w||"100%")+";";}
function stC(b,bg){return "background:"+(bg||"#fff")+";border:1.5px solid "+(b||"#e2e8f0")+";border-radius:16px;padding:14px;margin-bottom:10px;";}
function stL(){return "font-size:11px;font-weight:700;color:#64748b;letter-spacing:.8px;margin-bottom:5px;display:block;";}
function stBg(bg,c){return "background:"+bg+";color:"+c+";font-size:10px;font-weight:700;border-radius:20px;padding:3px 9px;display:inline-block;";}
function stS(){return stI()+"padding:12px 28px 12px 14px;background-image:"+SVG_ARROW+";background-repeat:no-repeat;background-position:right 12px center;";}

// ── INIT ──────────────────────────────────────────────
fbGet("_v3").then(function(snap){
  if(!snap.exists()){
    var uo={};
    uo[1]={id:1,nome:"Síndico",login:"sindico",senha:"1234",role:"sindico"};
    uo[2]={id:2,nome:"Subsíndico",login:"subsindico",senha:"1234",role:"subsindico"};
    var ao={};
    ["101","102","103","104","105","106"].forEach(function(n){ao[n]={id:n,numero:n,morador:"",telefone:"",email:"",blocoId:"",ativo:true};});
    var po={};po[ANO]={};
    ["101","102","103","104","105","106"].forEach(function(n){po[ANO][n]={};MO.forEach(function(m){po[ANO][n][m]={pago:false,data:""};});});
    return Promise.all([
      fbSet("users",uo),
      fbSet("cfg",{nomeCondominio:"",endereco:"",ano:ANO,taxaMensal:50,saldoCaixa:0,usaBlocos:false}),
      fbSet("apts",ao),fbSet("pay",po),fbSet("_v3",true)
    ]);
  }
}).then(function(){
  try{var s=sessionStorage.getItem("cu");if(s)ST.user=JSON.parse(s);}catch(e){}
  fbOn("users",function(v){ST.users=v?Object.values(v):[];pintar();});
  fbOn("cfg",function(v){if(v)Object.assign(ST.cfg,v);pintar();});
  fbOn("blocos",function(v){ST.blocos=v?Object.values(v):[];pintar();});
  fbOn("apts",function(v){ST.apts=v?Object.values(v).filter(function(a){return a.ativo;}):[];pintar();});
  fbOn("pay",function(v){ST.pay=v||{};pintar();});
  fbOn("desp",function(v){ST.desp=v?Object.values(v).sort(function(a,b){return b.id-a.id;}):[];pintar();});
  fbOn("avisos",function(v){ST.avisos=v?Object.values(v).sort(function(a,b){return b.id-a.id;}):[];pintar();});
  ST.loading=false;pintar();
}).catch(function(e){
  console.error("Firebase error:",e);
  ST.loading=false;pintar();
});

// ── AÇÕES GLOBAIS ─────────────────────────────────────
function irPara(t){ST.tela=t;ST.aptForm=false;ST.despForm=false;ST.avisoForm=false;ST.despEditId=null;pintar();}
function voltar(){ST.tela=ST.tela==="apt_d"?"apts":"meses";pintar();}
function sair(){try{sessionStorage.removeItem("cu");}catch(e){}ST.user=null;ST.tela="home";pintar();}

function fazerLogin(){
  var u=gv("fu").trim(),s=gv("fs");
  var found=ST.users.find(function(x){return x.login===u&&x.senha===s;});
  if(found){
    ST.user=found;
    try{sessionStorage.setItem("cu",JSON.stringify(found));}catch(e){}
    ST.tela="home";pintar();toast("Bem-vindo, "+found.nome+"!");
  } else {
    var el=document.getElementById("ferr");
    if(el){el.style.display="block";el.textContent="⚠️ Login ou senha incorretos.";}
  }
}

function marcarPagamento(aptId,mes){
  var ano=ST.selAno;
  var cur=ST.pay[ano]&&ST.pay[ano][aptId]&&ST.pay[ano][aptId][mes]&&ST.pay[ano][aptId][mes].pago;
  var tx=+ST.cfg.taxaMensal||0;
  var ns=(+ST.cfg.saldoCaixa||0)+(cur?-tx:tx);
  fbUpd("pay/"+ano+"/"+aptId+"/"+mes,{pago:!cur,data:!cur?hoje():""});
  fbUpd("cfg",{saldoCaixa:ns});
  toast(cur?"Pagamento desmarcado":"✅ Pago! Saldo atualizado.");
}

function abrirApt(id){ST.selAptId=id;ST.tela="apt_d";pintar();}
function abrirMes(i){ST.selMes=i;ST.tela="mes_d";pintar();}
function mudarAno(a){ST.selAno=parseInt(a);pintar();}
function novoAno(){
  var na=ST.selAno+1;
  var po={};
  ST.apts.forEach(function(a){po[a.id]={};MO.forEach(function(m){po[a.id][m]={pago:false,data:""};});});
  fbSet("pay/"+na,po).then(function(){ST.selAno=na;toast("Ano "+na+" iniciado!");pintar();});
}

// APARTAMENTOS
function salvarNovoApt(){
  var n=gv("an").trim();
  if(!n){toast("Informe o número","err");return;}
  if(ST.apts.find(function(a){return a.id===n;})){toast("Já existe","err");return;}
  var novo={id:n,numero:n,morador:gv("am"),telefone:gv("at"),email:gv("ae"),blocoId:gv("abk")||"",ativo:true};
  var po={};MO.forEach(function(m){po[m]={pago:false,data:""};});
  fbSet("apts/"+n,novo);fbSet("pay/"+ST.selAno+"/"+n,po);
  ST.aptForm=false;toast("Apt "+n+" adicionado!");
}
function salvarEditApt(){
  var a=aptById(ST.aptEditId);if(!a)return;
  fbSet("apts/"+a.id,Object.assign({},a,{numero:gv("ean")||a.numero,morador:gv("eam"),telefone:gv("eat"),email:gv("eae"),blocoId:gv("eabk")||""}));
  ST.aptEditId=null;toast("✓ Apartamento salvo!");
}
function removerApt(id){
  fbUpd("apts/"+id,{ativo:false});
  ST.modal=null;toast("Apartamento removido");
}

// BLOCOS
function salvarBloco(){
  var nome=gv("bnome").trim();if(!nome){toast("Informe o nome","err");return;}
  if(ST.blocoEditId){
    fbSet("blocos/"+ST.blocoEditId,{id:ST.blocoEditId,nome:nome});
    ST.blocoEditId=null;toast("✓ Bloco salvo!");
  } else {
    var id="b"+Date.now();
    fbSet("blocos/"+id,{id:id,nome:nome});
    toast("Bloco adicionado!");
  }
  pintar();
}
function removerBloco(id){fbDel("blocos/"+id);toast("Bloco removido");}

// USUÁRIOS
function salvarEditUser(){
  var u=userById(ST.userEditId);if(!u)return;
  var nome=gv("eun"),login=gv("eul"),senha=gv("eus"),role=gv("eur");
  if(!nome||!login||!senha){toast("Preencha todos","err");return;}
  var upd=Object.assign({},u,{nome:nome,login:login,senha:senha,role:role});
  fbSet("users/"+u.id,upd);
  if(ST.user&&ST.user.id===u.id){ST.user=upd;try{sessionStorage.setItem("cu",JSON.stringify(upd));}catch(e){}}
  ST.userEditId=null;toast("✓ Usuário salvo!");
}

// CONFIG
function salvarCfgGeral(){
  var el=document.getElementById("cblocos");
  var upd=Object.assign({},ST.cfg,{nomeCondominio:gv("cn"),endereco:gv("ce"),ano:parseInt(gv("ca"))||ANO,usaBlocos:el?el.checked:ST.cfg.usaBlocos});
  fbSet("cfg",upd);toast("✓ Configurações salvas!");
}
function salvarTaxa(){fbUpd("cfg",{taxaMensal:parseFloat(gv("ct"))||50});toast("✓ Taxa salva!");}

// DESPESAS
function salvarDesp(){
  var desc=gv("dd").trim(),val=gv("dv");
  if(!desc||!val){toast("Preencha descrição e valor","err");return;}
  var dtISO=gv("ddt");
  var f={desc:desc,valor:parseFloat(val),data:isoToBr(dtISO)||hoje(),mes:mesDoIso(dtISO),cat:gv("dc")||"luz",obs:gv("dob")||"",ano:ST.selAno,pago:false};
  if(ST.despEditId){
    var old=ST.desp.find(function(d){return String(d.id)===String(ST.despEditId);});
    var ns=+ST.cfg.saldoCaixa||0;
    if(old&&old.pago){ns+=+old.valor;ns-=f.valor;fbUpd("cfg",{saldoCaixa:ns});}
    fbUpd("desp/"+ST.despEditId,f);
    ST.despEditId=null;ST.despForm=false;toast("✓ Atualizada!");
  } else {
    var id=Date.now();
    fbSet("desp/"+id,Object.assign({},f,{id:id}));
    ST.despForm=false;toast("Despesa adicionada!");
  }
  pintar();
}
function pagarDesp(id){
  var d=ST.desp.find(function(x){return String(x.id)===String(id);});if(!d)return;
  var ns=(+ST.cfg.saldoCaixa||0)+(d.pago?+d.valor:-(+d.valor));
  fbUpd("desp/"+id,{pago:!d.pago});fbUpd("cfg",{saldoCaixa:ns});
  toast(d.pago?"Desmarcada":"💸 Pago!");
}
function delDesp(id){
  var d=ST.desp.find(function(x){return String(x.id)===String(id);});
  if(d&&d.pago)fbUpd("cfg",{saldoCaixa:(+ST.cfg.saldoCaixa||0)+(+d.valor)});
  fbDel("desp/"+id);ST.modal=null;toast("Removida");
}

// AVISOS
function salvarAviso(){
  var titulo=gv("ati").trim(),texto=gv("atx").trim();
  if(!titulo||!texto){toast("Preencha título e texto","err");return;}
  var id=Date.now();
  fbSet("avisos/"+id,{id:id,titulo:titulo,texto:texto,tipo:gv("atp")||"info",data:hoje(),autor:ST.user?ST.user.nome:"",lidos:{}});
  ST.avisoForm=false;toast("✓ Aviso publicado!");pintar();
}
function marcarLido(id){
  if(!ST.user)return;
  var upd={};upd[ST.user.id]=true;
  fbUpd("avisos/"+id+"/lidos",upd);
}
function delAviso(id){fbDel("avisos/"+id);ST.modal=null;toast("Aviso removido");}

// MODAL
function fecharModal(){ST.modal=null;pintar();}
function execModal(){if(ST.modal&&ST.modal.fn){ST.modal.fn();}}

function abrirModalConfirm(titulo,msg,fn){
  ST.modal={titulo:titulo,msg:msg,fn:fn};pintar();
}

// SALDO
function salvarSaldo(){
  var v=parseFloat(gv("mvs"))||0;
  fbUpd("cfg",{saldoCaixa:v});ST.modal=null;toast("✓ Saldo atualizado!");
}

// WHATSAPP
function enviarAvisoWA(avisoId){
  var a=ST.avisos.find(function(x){return String(x.id)===String(avisoId);});
  if(!a)return;
  var tipoLabel={info:"ℹ️ Informativo",urgente:"🚨 URGENTE",manutencao:"🔧 Manutenção",assembleia:"📋 Assembleia"};
  var msg="*"+(tipoLabel[a.tipo]||a.tipo)+" — "+(ST.cfg.nomeCondominio||"Condomínio")+"*\n\n*"+a.titulo+"*\n\n"+a.texto+"\n\n_"+a.data+(a.autor?" · "+a.autor:"")+"_";
  ST.modal={tipo:"wa",msg:msg,apts:ST.apts.filter(function(x){return x.telefone;})};pintar();
}

// PDF
function gerarPDF(){
  try{
    var doc=new window.jspdf.jsPDF();
    var arr=totalArr();
    var despAno=ST.desp.filter(function(d){return String(d.ano||ANO)===String(ST.selAno);});
    var despPagas=despAno.filter(function(d){return d.pago;}).reduce(function(s,d){return s+(+d.valor||0);},0);
    var y=20;
    doc.setFontSize(18);doc.setFont("helvetica","bold");
    doc.text(ST.cfg.nomeCondominio||"Condomínio",105,y,{align:"center"});y+=8;
    doc.setFontSize(11);doc.setFont("helvetica","normal");
    doc.text("Relatório Financeiro — "+ST.selAno,105,y,{align:"center"});y+=6;
    doc.text(ST.cfg.endereco||"",105,y,{align:"center"});y+=10;
    doc.setDrawColor(200);doc.line(15,y,195,y);y+=8;
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text("Resumo Geral",15,y);y+=8;
    doc.setFontSize(11);doc.setFont("helvetica","normal");
    doc.text("Total arrecadado: R$ "+fmt(arr),15,y);y+=6;
    doc.text("Total despesas pagas: R$ "+fmt(despPagas),15,y);y+=6;
    doc.text("Saldo em caixa: R$ "+fmt(ST.cfg.saldoCaixa),15,y);y+=6;
    doc.text("Taxa mensal: R$ "+fmt(ST.cfg.taxaMensal)+" por apartamento",15,y);y+=10;
    doc.line(15,y,195,y);y+=8;
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text("Adimplência por Mês",15,y);y+=8;
    doc.setFontSize(10);doc.setFont("helvetica","normal");
    MO.forEach(function(m,i){doc.text(MF[i]+": "+pctMes(m)+"% pagos",15,y);y+=5;if(y>270){doc.addPage();y=20;}});
    y+=4;doc.line(15,y,195,y);y+=8;
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text("Inadimplentes (mês atual)",15,y);y+=8;
    var mi=new Date().getMonth();
    var inadimp=ST.apts.filter(function(a){return!(ST.pay[ST.selAno]&&ST.pay[ST.selAno][a.id]&&ST.pay[ST.selAno][a.id][MO[mi]]&&ST.pay[ST.selAno][a.id][MO[mi]].pago);});
    doc.setFontSize(10);doc.setFont("helvetica","normal");
    if(!inadimp.length){doc.text("Nenhum inadimplente!",15,y);y+=6;}
    else inadimp.forEach(function(a){doc.text("Apt "+a.numero+(a.morador?" — "+a.morador:""),15,y);y+=5;if(y>270){doc.addPage();y=20;}});
    y+=4;doc.line(15,y,195,y);y+=8;
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text("Despesas do Ano",15,y);y+=8;
    doc.setFontSize(10);doc.setFont("helvetica","normal");
    if(!despAno.length){doc.text("Nenhuma despesa.",15,y);}
    else despAno.forEach(function(d){doc.text((d.pago?"[PAGO] ":"[PEND] ")+d.desc+" R$ "+fmt(d.valor)+" ("+d.mes+")",15,y);y+=5;if(y>270){doc.addPage();y=20;}});
    doc.setFontSize(9);doc.setTextColor(150);doc.text("Gerado em "+hoje()+" | CondoGest Pro",105,285,{align:"center"});
    doc.save("relatorio-"+ST.selAno+".pdf");toast("✓ PDF gerado!");
  }catch(e){console.error(e);toast("Erro ao gerar PDF","err");}
}

// ── RENDER PRINCIPAL ──────────────────────────────────
function pintar(){
  var el=document.getElementById("app");if(!el)return;
  if(ST.loading){
    el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px"><div style="font-size:48px">🏢</div><div style="color:#64748b;font-weight:600;font-size:16px">Conectando...</div></div>';
    return;
  }
  if(!ST.user){el.innerHTML=pgLogin();bindLogin();return;}
  var naoLidos=ST.avisos.filter(function(a){return!(a.lidos&&a.lidos[ST.user.id]);}).length;
  el.innerHTML=rToast()+rVoltar()+'<div style="padding-bottom:76px">'+pgAtual()+'</div>'+rNav(naoLidos)+rModal();
  bindPage();
}

function rToast(){
  if(!ST.toast)return"";

// ── BIND EVENTS ───────────────────────────────────────
function bindLogin(){
  var btn=document.getElementById("lbtn");
  if(btn)btn.onclick=fazerLogin;
  var fs=document.getElementById("fs");
  if(fs)fs.onkeydown=function(e){if(e.key==="Enter")fazerLogin();};
  var eye=document.getElementById("leye");
  if(eye)eye.onclick=function(){var x=document.getElementById("fs");if(x)x.type=x.type==="password"?"text":"password";};
}

function bindPage(){
  // Voltar
  var bv=document.getElementById("btn-voltar");if(bv)bv.onclick=voltar;
  // Nav
  ["home","apts","meses","desp","avisos","cfg"].forEach(function(id){
    var b=document.getElementById("nav-"+id);if(b)b.onclick=function(){irPara(id);};
  });
  // Modal cancel/ok
  var mc=document.getElementById("modal-cancel");if(mc)mc.onclick=fecharModal;
  var mok=document.getElementById("modal-ok");if(mok)mok.onclick=execModal;
  var mss=document.getElementById("modal-salvar-saldo");if(mss)mss.onclick=salvarSaldo;
  // WhatsApp modal
  var wac=document.getElementById("wa-copiar");
  if(wac&&ST.modal&&ST.modal.msg){
    var msg=ST.modal.msg;
    wac.onclick=function(){window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");};
  }
  if(ST.modal&&ST.modal.tipo==="wa"){
    var apts=ST.modal.apts||[];
    var msg2=ST.modal.msg;
    apts.forEach(function(a,i){
      var btn=document.getElementById("wa-"+i);
      if(btn){
        var tel=telLimpo(a.telefone);
        btn.onclick=function(){window.open("https://wa.me/55"+tel+"?text="+encodeURIComponent(msg2),"_blank");};
      }
    });
  }
  // Bind tela específica
  bindTela();
}

// ── SELETOR DE ANO ────────────────────────────────────
function rSeletorAno(){
  var anos=Object.keys(ST.pay).map(function(a){return parseInt(a);}).filter(function(a){return!isNaN(a);}).sort(function(a,b){return b-a;});
  if(!anos.length)anos=[ANO];
  var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;background:#fff;border-radius:14px;padding:10px 14px;border:1.5px solid #e2e8f0">';
  h+='<span style="font-size:12px;font-weight:700;color:#64748b">ANO:</span>';
  h+='<select id="sel-ano" style="border:none;background:none;font-weight:700;color:#1e293b;font-size:14px;cursor:pointer;flex:1">';
  anos.forEach(function(a){h+='<option value="'+a+'"'+(ST.selAno===a?" selected":"")+'>'+a+'</option>';});
  h+='</select>';
  h+='<button id="btn-novo-ano" style="background:#2563eb;color:#fff;border:none;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">+ Novo ano</button>';
  return h+'</div>';
}

    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">';
    h+='<div><label style="'+stL()+'">VALOR (R$) *</label><input id="dv" type="number" min="0" step="0.01" style="'+stI()+'" placeholder="0,00" value="'+(editDesp?editDesp.valor:"")+'"></div>';
    h+='<div><label style="'+stL()+'">DATA</label><input id="ddt" type="date" style="'+stI()+'" value="'+(editDesp?brToIso(editDesp.data):brToIso(hoje()))+'"></div></div>';
    h+='<div style="margin-bottom:12px"><label style="'+stL()+'">CATEGORIA</label><select id="dc" style="'+stS()+'">'+catOpts+'</select></div>';
    h+='<div style="margin-bottom:14px"><label style="'+stL()+'">OBSERVAÇÕES</label><input id="dob" style="'+stI()+'" placeholder="Ex: Nº nota fiscal..." value="'+(editDesp?editDesp.obs||"":"")+'"></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<button id="btn-cancel-desp" style="'+stB("#e2e8f0","#64748b")+'">Cancelar</button>';
    h+='<button id="btn-salvar-desp" style="'+stB("#f59e0b")+'">'+(ST.despEditId?"Salvar":"Adicionar")+'</button></div></div>';
  }
  if(!fil.length)h+='<div style="text-align:center;color:#94a3b8;padding:32px;background:#fff;border-radius:16px"><div style="font-size:32px;margin-bottom:8px">💰</div><div>Nenhuma despesa'+(ST.despFiltro!=="Todos"?" em "+ST.despFiltro:"")+'.</div></div>';
  fil.forEach(function(d){
    var cc=CATC[d.cat]||"#94a3b8";
    h+='<div style="'+stC()+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
    h+='<div style="flex:1;margin-right:10px"><div style="font-weight:700;color:#1e293b;font-size:14px">'+d.desc+'</div>';
    h+='<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">';
    h+='<span style="'+stBg(cc+"22",cc)+'">'+(CATS[d.cat]||d.cat)+'</span>';
    h+='<span style="'+stBg("#f1f5f9","#64748b")+'">'+d.mes+'</span>';
    if(d.data)h+='<span style="'+stBg("#f1f5f9","#64748b")+'">📅 '+d.data+'</span>';
    h+='</div>';
    if(d.obs)h+='<div style="font-size:12px;color:#94a3b8;margin-top:5px">📝 '+d.obs+'</div>';
    h+='</div>';
    h+='<div style="text-align:right;flex-shrink:0"><div style="font-weight:800;color:#1e293b;font-size:15px">R$ '+fmt(d.valor)+'</div>';
    h+='<button data-pagar-desp="'+d.id+'" style="margin-top:6px;background:'+(d.pago?"#dcfce7":"#fee2e2")+';color:'+(d.pago?"#16a34a":"#dc2626")+';border:none;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer">'+(d.pago?"✓ Pago":"Pendente")+'</button></div></div>';
    h+='<div style="display:flex;gap:8px">';
    h+='<button data-edit-desp="'+d.id+'" style="flex:1;background:#f1f5f9;color:#374151;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:600;cursor:pointer">✏️ Editar</button>';
    h+='<button data-del-desp="'+d.id+'" style="flex:1;background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:600;cursor:pointer">🗑 Excluir</button>';
    h+='</div></div>';
  });
  return h+'</div></div>';
}

// ── AVISOS ────────────────────────────────────────────
function pgAvisos(){
  var tipoC={info:"#3b82f6",urgente:"#ef4444",manutencao:"#10b981",assembleia:"#8b5cf6"};
  var tipoL={info:"ℹ️ Informativo",urgente:"🚨 Urgente",manutencao:"🔧 Manutenção",assembleia:"📋 Assembleia"};
  var fil=ST.avisoFiltro==="todos"?ST.avisos:ST.avisos.filter(function(a){return a.tipo===ST.avisoFiltro;});
  var h='<div class="fade" style="padding:0 0 20px">';
  h+='<div style="background:linear-gradient(135deg,#4c1d95,#7c3aed);padding:20px 16px 24px;border-radius:0 0 24px 24px;margin-bottom:16px">';
  h+='<div style="color:#ddd6fe;font-size:11px;font-weight:700;letter-spacing:1px">COMUNICADOS</div>';
  h+='<div style="color:#fff;font-size:20px;font-weight:900;margin-bottom:4px">Mural de Avisos</div>';
  h+='<div style="color:#c4b5fd;font-size:13px">'+ST.avisos.length+' publicações</div></div>';
  h+='<div style="padding:0 16px">';
  // Filtros
  h+='<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px">';
  [["todos","Todos"],["info","Informativo"],["urgente","Urgente"],["manutencao","Manutenção"],["assembleia","Assembleia"]].forEach(function(x){
    h+='<button data-aviso-filtro="'+x[0]+'" style="background:'+(ST.avisoFiltro===x[0]?"#7c3aed":"#f1f5f9")+';color:'+(ST.avisoFiltro===x[0]?"#fff":"#374151")+';border:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0">'+x[1]+'</button>';
  });
  h+='</div>';
  h+='<button id="btn-toggle-aviso" style="'+stB("#7c3aed")+'margin-bottom:12px">'+(ST.avisoForm?"✕ Fechar":"📢 Novo Aviso")+'</button>';
  // Form aviso
  if(ST.avisoForm){
    h+='<div style="'+stC("#ddd6fe","#faf5ff")+'margin-bottom:14px">';
    h+='<div style="font-weight:800;color:#1e293b;font-size:15px;margin-bottom:14px">Novo Aviso</div>';
    h+='<div style="margin-bottom:12px"><label style="'+stL()+'">TÍTULO *</label><input id="ati" style="'+stI()+'" placeholder="Ex: Reunião de condomínio"></div>';
    h+='<div style="margin-bottom:12px"><label style="'+stL()+'">MENSAGEM *</label><textarea id="atx" style="'+stI()+'height:100px;padding-top:12px" placeholder="Digite o comunicado..."></textarea></div>';
    h+='<div style="margin-bottom:14px"><label style="'+stL()+'">TIPO</label><select id="atp" style="'+stS()+'"><option value="info">ℹ️ Informativo</option><option value="urgente">🚨 Urgente</option><option value="manutencao">🔧 Manutenção</option><option value="assembleia">📋 Assembleia</option></select></div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h+='<button id="btn-cancel-aviso" style="'+stB("#e2e8f0","#64748b")+'">Cancelar</button>';
    h+='<button id="btn-salvar-aviso" style="'+stB("#7c3aed")+'">Publicar</button></div></div>';
  }
  if(!fil.length)h+='<div style="text-align:center;color:#94a3b8;padding:32px;background:#fff;border-radius:16px"><div style="font-size:32px;margin-bottom:8px">📢</div><div>Nenhum aviso.</div></div>';
  fil.forEach(function(a){
    var tc=tipoC[a.tipo]||"#64748b";
    var tl=tipoL[a.tipo]||a.tipo;
    var lido=ST.user&&a.lidos&&a.lidos[ST.user.id];
    var aid=String(a.id);
    h+='<div style="'+stC(lido?"#e2e8f0":"#c4b5fd",lido?"#fff":"#faf5ff")+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
    h+='<div style="flex:1"><span style="'+stBg(tc+"22",tc)+'margin-bottom:6px;display:inline-block">'+tl+'</span>';
    h+='<div style="font-weight:800;color:#1e293b;font-size:15px;margin-top:4px">'+a.titulo+'</div></div>';
    h+='<button data-del-aviso="'+aid+'" style="background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer;margin-left:8px">🗑</button></div>';
    h+='<div style="font-size:14px;color:#374151;margin-bottom:10px;line-height:1.5">'+a.texto+'</div>';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
    h+='<div style="font-size:11px;color:#94a3b8">'+a.data+(a.autor?" · "+a.autor:"")+'</div>';
    if(lido){h+='<span style="font-size:11px;color:#22c55e;font-weight:600">✓ Lido</span>';}
    else{h+='<button data-lido="'+aid+'" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer">Marcar como lido</button>';}
    h+='</div>';
    h+='<button data-wa-aviso="'+aid+'" style="width:100%;background:#22c55e;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">📱 Enviar no WhatsApp</button>';
    h+='</div>';
  });
  return h+'</div></div>';
}

// ── CONFIG ────────────────────────────────────────────
function pgCfg(){
  var tab=ST.cfgTab;
  var TABS=[["geral","⚙️ Geral"],["taxas","💲 Taxa"],["blocos","🏗 Blocos"],["apts","🚪 Apts"],["usuarios","👤 Usuários"],["dados","🗂 Dados"]];
  var h='<div class="fade" style="padding:0 0 20px">';
  h+='<div style="background:linear-gradient(135deg,#1e293b,#334155);padding:20px 16px 24px;border-radius:0 0 24px 24px;margin-bottom:16px">';
  h+='<div style="color:#94a3b8;font-size:11px;font-weight:700;letter-spacing:1px">CONFIGURAÇÕES</div>';
  h+='<div style="color:#fff;font-size:20px;font-weight:900">CondoGest Pro</div></div>';
  h+='<div style="display:flex;gap:6px;overflow-x:auto;padding:0 16px 12px">';
  TABS.forEach(function(t){
    h+='<button data-cfg-tab="'+t[0]+'" style="background:'+(tab===t[0]?"#1e293b":"#f1f5f9")+';color:'+(tab===t[0]?"#fff":"#374151")+';border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0">'+t[1]+'</button>';
  });
  h+='</div><div style="padding:0 16px">';
  // GERAL
  if(tab==="geral"){
    h+='<div style="margin-bottom:14px"><label style="'+stL()+'">NOME DO CONDOMÍNIO</label><input id="cn" style="'+stI()+'" value="'+(ST.cfg.nomeCondominio||"")+'" placeholder="Ex: Residencial das Flores"></div>';
    h+='<div style="margin-bottom:14px"><label style="'+stL()+'">ENDEREÇO</label><input id="ce" style="'+stI()+'" value="'+(ST.cfg.endereco||"")+'" placeholder="Ex: Rua das Acácias, 123"></div>';
    h+='<div style="margin-bottom:14px"><label style="'+stL()+'">ANO</label><input id="ca" type="number" style="'+stI()+'" value="'+(ST.cfg.ano||ANO)+'"></div>';
    h+='<div style="'+stC()+'margin-bottom:20px;display:flex;align-items:center;gap:12px">';
    h+='<input type="checkbox" id="cblocos" style="width:20px;height:20px;cursor:pointer;flex-shrink:0"'+(ST.cfg.usaBlocos?" checked":"")+'>';
    h+='<div><div style="font-weight:700;color:#1e293b">Usar Blocos</div><div style="font-size:12px;color:#64748b">Organizar apartamentos em blocos (A, B, C...)</div></div></div>';
    h+='<button id="btn-salvar-cfg" style="'+stB("#1e293b")+'">Salvar Configurações</button>';
  }
  // TAXAS
  if(tab==="taxas"){
    h+='<div style="'+stC("#bfdbfe","#eff6ff")+'margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:#1e3a5f">💡 Taxa mensal por apartamento. Ao marcar como pago, o valor é somado ao saldo automaticamente.</div></div>';
    h+='<div style="margin-bottom:14px"><label style="'+stL()+'">TAXA MENSAL POR APARTAMENTO (R$)</label><input id="ct" type="number" min="0" step="0.01" style="'+stI()+'" value="'+(ST.cfg.taxaMensal||50)+'"></div>';
    h+='<div style="'+stC("#bbf7d0","#f0fdf4")+'margin-bottom:16px"><div style="color:#64748b;font-size:12px">Por apartamento/mês:</div><div style="font-weight:900;font-size:28px;color:#16a34a">R$ '+fmt(ST.cfg.taxaMensal||50)+'</div><div style="color:#64748b;font-size:12px;margin-top:4px">Potencial anual ('+ST.apts.length+' apts): <b>R$ '+fmt((+ST.cfg.taxaMensal||50)*ST.apts.length*12)+'</b></div></div>';
    h+='<button id="btn-salvar-taxa" style="'+stB("#16a34a")+'">Salvar Taxa</button>';
  }
  // BLOCOS
  if(tab==="blocos"){
    h+='<div style="'+stC("#bfdbfe","#eff6ff")+'margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:#1e3a5f">🏗 Configure os blocos e ative "Usar Blocos" em Geral.</div></div>';
    if(ST.blocoEditId){
      var be=blocoById(ST.blocoEditId)||{};
      h+='<div style="'+stC("#bfdbfe","#eff6ff")+'">';
      h+='<div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando bloco</div>';
      h+='<div style="margin-bottom:12px"><label style="'+stL()+'">NOME DO BLOCO</label><input id="bnome" style="'+stI()+'" value="'+(be.nome||"")+'"></div>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button id="btn-cancel-bloco" style="'+stB("#e2e8f0","#64748b")+'">Cancelar</button><button id="btn-salvar-bloco" style="'+stB("#2563eb")+'">Salvar</button></div></div>';
    } else {
      h+='<div style="'+stC("#eff6ff","#eff6ff")+'margin-bottom:12px"><div style="font-weight:700;color:#1e293b;margin-bottom:10px">Novo Bloco</div>';
      h+='<div style="margin-bottom:10px"><label style="'+stL()+'">NOME (ex: Bloco A)</label><input id="bnome" style="'+stI()+'" placeholder="Ex: Bloco A"></div>';
      h+='<button id="btn-salvar-bloco" style="'+stB("#2563eb")+'">Adicionar Bloco</button></div>';
      if(!ST.blocos.length)h+='<div style="text-align:center;color:#94a3b8;padding:24px">Nenhum bloco cadastrado.</div>';
      ST.blocos.forEach(function(b){
        h+='<div style="'+stC()+'"><div style="display:flex;justify-content:space-between;align-items:center">';
        h+='<div style="font-weight:800;color:#1e293b">'+b.nome+'</div>';
        h+='<div style="display:flex;gap:6px"><button data-edit-bloco="'+b.id+'" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer">✏️</button>';
        h+='<button data-del-bloco="'+b.id+'" style="background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer">🗑</button></div></div></div>';
      });
    }
  }
  // APTS
  if(tab==="apts"){
    if(ST.aptEditId){
      var ae=aptById(ST.aptEditId);
      if(ae){
        var blocoOpts2='<option value="">Sem bloco</option>';
        ST.blocos.forEach(function(b){blocoOpts2+='<option value="'+b.id+'"'+(ae.blocoId===b.id?" selected":"")+'>'+b.nome+'</option>';});
        h+='<div style="'+stC("#bfdbfe","#eff6ff")+'">';
        h+='<div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando Apt '+ae.numero+'</div>';
        h+='<div style="margin-bottom:10px"><label style="'+stL()+'">NÚMERO</label><input id="ean" style="'+stI()+'" value="'+ae.numero+'"></div>';
        h+='<div style="margin-bottom:10px"><label style="'+stL()+'">MORADOR</label><input id="eam" style="'+stI()+'" value="'+(ae.morador||"")+'"></div>';
        h+='<div style="margin-bottom:10px"><label style="'+stL()+'">TELEFONE</label><input id="eat" style="'+stI()+'" value="'+(ae.telefone||"")+'"></div>';
        h+='<div style="margin-bottom:10px"><label style="'+stL()+'">E-MAIL</label><input id="eae" style="'+stI()+'" value="'+(ae.email||"")+'"></div>';
        if(ST.cfg.usaBlocos)h+='<div style="margin-bottom:10px"><label style="'+stL()+'">BLOCO</label><select id="eabk" style="'+stS()+'">'+blocoOpts2+'</select></div>';
        h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">';
        h+='<button id="btn-cancel-edit-apt" style="'+stB("#e2e8f0","#64748b")+'">Cancelar</button>';
        h+='<button id="btn-salvar-edit-apt" style="'+stB("#2563eb")+'">Salvar</button></div></div>';
      }
    } else {
      ST.apts.forEach(function(a){
        h+='<div style="'+stC()+'"><div style="display:flex;justify-content:space-between;align-items:flex-start">';
        h+='<div><div style="font-weight:800;color:#1e293b;font-size:15px">Apt '+a.numero+'</div>';
        if(ST.cfg.usaBlocos&&a.blocoId)h+='<div style="font-size:11px;color:#2563eb">'+nomeBloco(a.blocoId)+'</div>';
        h+='<div style="font-size:13px;color:'+(a.morador?"#374151":"#cbd5e1")+';font-style:'+(a.morador?"normal":"italic")+'">'+(a.morador||"Sem morador")+'</div>';
        if(a.telefone)h+='<div style="font-size:12px;color:#64748b">'+a.telefone+'</div>';
        h+='</div><div style="display:flex;gap:6px">';
        h+='<button data-edit-apt="'+a.id+'" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer">✏️</button>';
        h+='<button data-del-apt="'+a.id+'" style="background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer">🗑</button>';
        h+='</div></div></div>';
      });
      if(!ST.apts.length)h+='<div style="text-align:center;color:#94a3b8;padding:24px">Nenhum apartamento.</div>';
    }
  }
  // USUÁRIOS
  if(tab==="usuarios"){
    if(ST.userEditId){
      var ue=userById(ST.userEditId);
      if(ue){
        h+='<div style="'+stC("#ddd6fe","#faf5ff")+'">';
        h+='<div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando: '+ue.nome+'</div>';
        h+='<div style="margin-bottom:10px"><label style="'+stL()+'">NOME</label><input id="eun" style="'+stI()+'" value="'+ue.nome+'"></div>';
        h+='<div style="margin-bottom:10px"><label style="'+stL()+'">LOGIN</label><input id="eul" style="'+stI()+'" value="'+ue.login+'" autocapitalize="none"></div>';
        h+='<div style="margin-bottom:10px"><label style="'+stL()+'">SENHA</label><input id="eus" type="password" style="'+stI()+'" value="'+ue.senha+'"></div>';
        h+='<div style="margin-bottom:14px"><label style="'+stL()+'">FUNÇÃO</label><select id="eur" style="'+stS()+'"><option value="sindico"'+(ue.role==="sindico"?" selected":"")+'>Síndico</option><option value="subsindico"'+(ue.role==="subsindico"?" selected":"")+'>Subsíndico</option></select></div>';
        h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button id="btn-cancel-user" style="'+stB("#e2e8f0","#64748b")+'">Cancelar</button><button id="btn-salvar-user" style="'+stB("#7c3aed")+'">Salvar</button></div></div>';
      }
    } else {
      ST.users.forEach(function(u){
        h+='<div style="'+stC()+'"><div style="display:flex;justify-content:space-between;align-items:center">';
        h+='<div><div style="font-weight:800;color:#1e293b">'+u.nome+'</div><div style="font-size:12px;color:#64748b">Login: <b>'+u.login+'</b> · '+(u.role==="sindico"?"Síndico":"Subsíndico")+'</div></div>';
        h+='<button data-edit-user="'+u.id+'" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer">✏️ Editar</button>';
        h+='</div></div>';
      });
    }
  }
  // DADOS
  if(tab==="dados"){
    h+=rSeletorAno();
    h+='<div style="'+stC("#bbf7d0","#f0fdf4")+'margin-bottom:12px"><div style="font-weight:700;color:#065f46;margin-bottom:4px">🔄 Sincronização em tempo real</div><div style="font-size:13px;color:#047857">Dados sincronizados entre todos os dispositivos via Firebase.</div></div>';
    h+='<div style="'+stC()+'margin-bottom:12px"><div style="font-weight:700;color:#1e293b;margin-bottom:4px">📄 Relatório PDF</div><div style="font-size:13px;color:#64748b;margin-bottom:12px">Gera relatório completo do ano com pagamentos, despesas e inadimplentes.</div><button id="btn-pdf2" style="'+stB("#1e293b")+'">Gerar PDF — '+ST.selAno+'</button></div>';
    h+='<div style="'+stC()+'margin-bottom:12px"><div style="font-weight:700;color:#1e293b;margin-bottom:4px">🚪 Sair do sistema</div><div style="font-size:13px;color:#64748b;margin-bottom:12px">Encerra a sessão atual.</div><button id="btn-sair-sistema" style="'+stB("#475569")+'">Sair do Sistema</button></div>';
    h+='<div style="'+stC("#fecaca","#fff5f5")+'"><div style="font-weight:700;color:#991b1b;margin-bottom:4px">⚠️ Zerar Dados do Ano</div><div style="font-size:13px;color:#7f1d1d;margin-bottom:12px">Remove pagamentos e despesas de '+ST.selAno+'. Histórico de outros anos mantido.</div><button id="btn-zerar" style="'+stB("#ef4444")+'">Zerar Dados de '+ST.selAno+'</button></div>';
  }
  return h+'</div></div>';
}
</script>
