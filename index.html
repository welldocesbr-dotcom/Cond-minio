<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Condomínio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f4f8;min-height:100vh}
input,select,button{font-family:inherit;font-size:14px}
select{appearance:none;-webkit-appearance:none}
.fade{animation:fade .15s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style>
<!-- Firebase compat (funciona sem type=module) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<div id="app" style="max-width:430px;margin:0 auto;min-height:100vh">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px">
    <div style="font-size:48px">🏢</div>
    <div style="color:#64748b;font-weight:600;font-size:16px">Conectando...</div>
  </div>
</div>
<script>
// ── FIREBASE ──────────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyDKqdGqPDHpbeOjChWjxg453g9xUNo_bZE",
  authDomain:"cond-ce038.firebaseapp.com",
  databaseURL:"https://cond-ce038-default-rtdb.firebaseio.com",
  projectId:"cond-ce038",
  storageBucket:"cond-ce038.firebasestorage.app",
  messagingSenderId:"797254652697",
  appId:"1:797254652697:web:9e790186009dbda2c02b88"
});
var db = firebase.database();
function fbSet(p,v){return db.ref(p).set(v);}
function fbUpd(p,v){return db.ref(p).update(v);}
function fbDel(p){return db.ref(p).remove();}
function fbOn(p,cb){db.ref(p).on("value",function(s){cb(s.val());});}
function fbGet(p){return db.ref(p).once("value");}

// ── CONSTANTES ────────────────────────────────────────
var MO=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
var MF=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var CATS={luz:"⚡ Luz",agua:"💧 Água",manutencao:"🔧 Manutenção",limpeza:"🧹 Limpeza",seguranca:"🔒 Segurança",outros:"📦 Outros"};
var CATC={luz:"#eab308",agua:"#06b6d4",manutencao:"#10b981",limpeza:"#3b82f6",seguranca:"#8b5cf6",outros:"#94a3b8"};

// ── ESTADO ────────────────────────────────────────────
var ST={
  tela:"home",user:null,users:[],
  cfg:{nomeCondominio:"",endereco:"",ano:2025,taxaMensal:50,saldoCaixa:0},
  apts:[],pay:{},desp:[],loading:true,toast:null,modal:null,
  aptForm:null,despForm:null,despEditId:null,
  cfgTab:"geral",aptEditId:null,userEditId:null,
  selAptId:null,selMes:null
};

// ── HELPERS ───────────────────────────────────────────
function fmt(n){return(+n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function hoje(){var d=new Date();return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function pad(n){return n<10?"0"+n:String(n);}
function isoToBr(s){if(!s)return"";var p=s.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function brToIso(s){if(!s)return"";var p=s.split("/");return p[2]+"-"+p[1]+"-"+p[0];}
function mesDoIso(s){if(!s)return MO[new Date().getMonth()];return MO[parseInt(s.split("-")[1])-1]||MO[new Date().getMonth()];}
function pctApt(id){var p=0;MO.forEach(function(m){if(ST.pay[id]&&ST.pay[id][m]&&ST.pay[id][m].pago)p++;});return Math.round(p/12*100);}
function pctMes(m){if(!ST.apts.length)return 0;var p=ST.apts.filter(function(a){return ST.pay[a.id]&&ST.pay[a.id][m]&&ST.pay[a.id][m].pago;}).length;return Math.round(p/ST.apts.length*100);}
function totalArr(){var t=0;var tx=+ST.cfg.taxaMensal||0;ST.apts.forEach(function(a){MO.forEach(function(m){if(ST.pay[a.id]&&ST.pay[a.id][m]&&ST.pay[a.id][m].pago)t+=tx;});});return t;}
function totalDespPagas(){return ST.desp.filter(function(d){return d.pago;}).reduce(function(s,d){return s+(+d.valor||0);},0);}
function aptById(id){return ST.apts.find(function(a){return a.id===id;})||null;}
function userById(id){return ST.users.find(function(u){return u.id===id;})||null;}
function gval(id){var el=document.getElementById(id);return el?el.value:"";}

// ── TOAST ─────────────────────────────────────────────
var _tt;
function toast(msg,tipo){
  clearTimeout(_tt);ST.toast={msg:msg,tipo:tipo||"ok"};pintar();
  _tt=setTimeout(function(){ST.toast=null;pintar();},2500);
}

// ── CSS ───────────────────────────────────────────────
function I(){return"width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 14px;font-size:14px;background:#fff;color:#1e293b;box-sizing:border-box;";}
function BTN(bg,c,w){return"background:"+(bg||"#2563eb")+";color:"+(c||"#fff")+";border:none;border-radius:13px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;width:"+(w||"100%")+";";}
function CARD(b,bg){return"background:"+(bg||"#fff")+";border:1.5px solid "+(b||"#e2e8f0")+";border-radius:16px;padding:14px;margin-bottom:10px;";}
function LBL(){return"font-size:11px;font-weight:700;color:#64748b;letter-spacing:.8px;margin-bottom:5px;display:block;";}
function BADGE(bg,c){return"background:"+bg+";color:"+c+";font-size:10px;font-weight:700;border-radius:20px;padding:3px 9px;display:inline-block;";}
function SEL(){return I()+"padding:12px 28px 12px 14px;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22%3E%3Cpath fill=%22%2364748b%22 d=%22M6 8L1 3h10z%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center;";}

// ── INIT ──────────────────────────────────────────────
fbGet("_init").then(function(snap){
  if(!snap.exists()){
    var uo={1:{id:1,nome:"Síndico",login:"sindico",senha:"1234",role:"sindico"},2:{id:2,nome:"Subsíndico",login:"subsindico",senha:"1234",role:"subsindico"}};
    var ao={};["101","102","103","104","105","106"].forEach(function(n){ao[n]={id:n,numero:n,morador:"",telefone:"",email:"",ativo:true};});
    var po={};["101","102","103","104","105","106"].forEach(function(n){po[n]={};MO.forEach(function(m){po[n][m]={pago:false,data:""};});});
    return Promise.all([fbSet("users",uo),fbSet("cfg",{nomeCondominio:"",endereco:"",ano:2025,taxaMensal:50,saldoCaixa:0}),fbSet("apts",ao),fbSet("pay",po),fbSet("_init",true)]);
  }
}).then(function(){
  try{var s=sessionStorage.getItem("u");if(s)ST.user=JSON.parse(s);}catch(e){}
  fbOn("users",function(v){ST.users=v?Object.values(v):[];pintar();});
  fbOn("cfg",function(v){if(v)ST.cfg=Object.assign({nomeCondominio:"",endereco:"",ano:2025,taxaMensal:50,saldoCaixa:0},v);pintar();});
  fbOn("apts",function(v){ST.apts=v?Object.values(v).filter(function(a){return a.ativo;}):[];pintar();});
  fbOn("pay",function(v){ST.pay=v||{};pintar();});
  fbOn("desp",function(v){ST.desp=v?Object.values(v).sort(function(a,b){return b.id-a.id;}):[];pintar();});
  ST.loading=false;pintar();
}).catch(function(e){console.error(e);ST.loading=false;pintar();});

// ── AÇÕES ─────────────────────────────────────────────
function irPara(t){ST.tela=t;ST.aptForm=null;ST.despForm=null;ST.despEditId=null;pintar();}
function voltar(){ST.tela=ST.tela==="apt_d"?"apts":"meses";pintar();}
function sair(){try{sessionStorage.removeItem("u");}catch(e){}ST.user=null;ST.tela="home";pintar();}

function fazerLogin(){
  var u=gval("fu").trim(),s=gval("fs");
  var found=ST.users.find(function(x){return x.login===u&&x.senha===s;});
  if(found){ST.user=found;try{sessionStorage.setItem("u",JSON.stringify(found));}catch(e){}ST.tela="home";pintar();toast("Bem-vindo, "+found.nome+"!");}
  else{var e=document.getElementById("ferr");if(e){e.style.display="block";e.textContent="⚠️ Login ou senha incorretos.";}}
}

function marcarPagamento(aptId,mes){
  var cur=(ST.pay[aptId]&&ST.pay[aptId][mes]&&ST.pay[aptId][mes].pago)||false;
  var tx=+ST.cfg.taxaMensal||0;
  var ns=(+ST.cfg.saldoCaixa||0)+(!cur?tx:-tx);
  var upd={pago:!cur,data:!cur?hoje():""};
  fbUpd("pay/"+aptId+"/"+mes,upd).then(function(){return fbUpd("cfg",{saldoCaixa:ns});}).then(function(){toast(!cur?"✅ Pago! Saldo atualizado.":"Pagamento desmarcado");});
}

function abrirApt(id){ST.selAptId=id;ST.tela="apt_d";pintar();}
function abrirMes(i){ST.selMes=i;ST.tela="mes_d";pintar();}

function toggleFormApt(){ST.aptForm=ST.aptForm?null:{};pintar();}
function cancelarFormApt(){ST.aptForm=null;pintar();}
function salvarNovoApt(){
  var n=gval("an").trim();
  if(!n){toast("Informe o número","err");return;}
  if(ST.apts.find(function(a){return a.id===n;})){toast("Já existe","err");return;}
  var novo={id:n,numero:n,morador:gval("am"),telefone:gval("at"),email:gval("ae"),ativo:true};
  var po={};MO.forEach(function(m){po[m]={pago:false,data:""};});
  Promise.all([fbSet("apts/"+n,novo),fbSet("pay/"+n,po)]).then(function(){ST.aptForm=null;toast("Apt "+n+" adicionado!");});
}

function abrirEditApt(id){ST.aptEditId=id;ST.cfgTab="apts";pintar();}
function cancelarEditApt(){ST.aptEditId=null;pintar();}
function salvarEditApt(){
  var a=aptById(ST.aptEditId);if(!a)return;
  var upd=Object.assign({},a,{numero:gval("ean")||a.numero,morador:gval("eam"),telefone:gval("eat"),email:gval("eae")});
  fbSet("apts/"+upd.id,upd).then(function(){ST.aptEditId=null;toast("✓ Apartamento salvo!");});
}
function confirmarRemoverApt(id){
  var a=aptById(id);if(!a)return;
  ST.modal={titulo:"Remover Apt "+a.numero+"?",msg:"Os pagamentos também serão removidos.",cor:"#ef4444",label:"Remover",fn:function(){removerApt(id);}};pintar();
}
function removerApt(id){
  Promise.all([fbUpd("apts/"+id,{ativo:false}),fbDel("pay/"+id)]).then(function(){ST.modal=null;toast("Apartamento removido");});
}

function abrirEditUser(id){ST.userEditId=id;ST.cfgTab="usuarios";pintar();}
function cancelarEditUser(){ST.userEditId=null;pintar();}
function salvarEditUser(){
  var u=userById(ST.userEditId);if(!u)return;
  var nome=gval("eun"),login=gval("eul"),senha=gval("eus"),role=gval("eur");
  if(!nome||!login||!senha){toast("Preencha todos os campos","err");return;}
  var upd=Object.assign({},u,{nome:nome,login:login,senha:senha,role:role});
  fbSet("users/"+u.id,upd).then(function(){
    if(ST.user&&ST.user.id===u.id){ST.user=upd;try{sessionStorage.setItem("u",JSON.stringify(upd));}catch(e){}}
    ST.userEditId=null;toast("✓ Usuário salvo!");
  });
}

function mudarCfgTab(t){ST.cfgTab=t;ST.aptEditId=null;ST.userEditId=null;pintar();}

function salvarCfgGeral(){
  var upd=Object.assign({},ST.cfg,{nomeCondominio:gval("cn"),endereco:gval("ce"),ano:gval("ca")||2025});
  fbSet("cfg",upd).then(function(){toast("✓ Configurações salvas!");});
}
function salvarTaxa(){
  var tx=parseFloat(gval("ct"))||50;
  fbUpd("cfg",{taxaMensal:tx}).then(function(){toast("✓ Taxa salva!");});
}
function abrirAjusteSaldo(){ST.modal={tipo:"saldo"};pintar();}
function salvarSaldo(){
  var v=parseFloat(gval("mvs"))||0;
  fbUpd("cfg",{saldoCaixa:v}).then(function(){ST.modal=null;toast("✓ Saldo atualizado!");});
}
function fecharModal(){ST.modal=null;pintar();}
function executarModal(){if(ST.modal&&ST.modal.fn)ST.modal.fn();}
function confirmarReset(){
  ST.modal={titulo:"Zerar todos os dados?",msg:"Pagamentos, despesas e saldo serão apagados.",cor:"#ef4444",label:"Zerar tudo",fn:function(){
    var po={};ST.apts.forEach(function(a){po[a.id]={};MO.forEach(function(m){po[a.id][m]={pago:false,data:""};});});
    Promise.all([fbSet("pay",po),fbDel("desp"),fbUpd("cfg",{saldoCaixa:0})]).then(function(){ST.modal=null;toast("Dados zerados!");});
  }};pintar();
}

var despFiltro="Todos";
function setDespFiltro(m){despFiltro=m;pintar();}
function toggleFormDesp(){
  if(ST.despForm){ST.despForm=null;ST.despEditId=null;}
  else{ST.despForm={desc:"",valor:"",data:hoje(),cat:"luz",obs:""};ST.despEditId=null;}
  pintar();
}
function cancelarFormDesp(){ST.despForm=null;ST.despEditId=null;pintar();}
function salvarDesp(){
  var desc=gval("dd").trim(),val=gval("dv");
  if(!desc||!val){toast("Preencha descrição e valor","err");return;}
  var dtISO=gval("ddt");
  var dt=isoToBr(dtISO)||hoje();
  var mes=mesDoIso(dtISO);
  var f={desc:desc,valor:parseFloat(val),data:dt,mes:mes,cat:gval("dc")||"luz",obs:gval("dob")||""};
  if(ST.despEditId){
    var eid=ST.despEditId;
    var old=ST.desp.find(function(d){return String(d.id)===String(eid);});
    var ns=+ST.cfg.saldoCaixa||0;
    if(old&&old.pago){ns+=+old.valor;ns-=f.valor;}
    var p2=old&&old.pago?[fbUpd("desp/"+eid,f),fbUpd("cfg",{saldoCaixa:ns})]:[fbUpd("desp/"+eid,f)];
    Promise.all(p2).then(function(){ST.despForm=null;ST.despEditId=null;toast("✓ Despesa atualizada!");});
  }else{
    var id=Date.now();
    fbSet("desp/"+id,Object.assign({},f,{id:id,pago:false})).then(function(){ST.despForm=null;toast("Despesa adicionada!");});
  }
}
function editarDesp(id){
  var d=ST.desp.find(function(x){return String(x.id)===String(id);});if(!d)return;
  ST.despEditId=id;ST.despForm={desc:d.desc,valor:String(d.valor),data:d.data||hoje(),cat:d.cat,obs:d.obs||""};
  pintar();
}
function pagarDesp(id){
  var d=ST.desp.find(function(x){return String(x.id)===String(id);});if(!d)return;
  var ns=(+ST.cfg.saldoCaixa||0)+(d.pago?+d.valor:-(+d.valor));
  Promise.all([fbUpd("desp/"+id,{pago:!d.pago}),fbUpd("cfg",{saldoCaixa:ns})]).then(function(){toast(d.pago?"Despesa desmarcada":"💸 Pago! Saldo atualizado.");});
}
function confirmarDelDesp(id){
  ST.modal={titulo:"Excluir despesa?",msg:"Esta ação não pode ser desfeita.",cor:"#ef4444",label:"Excluir",fn:function(){
    var d=ST.desp.find(function(x){return String(x.id)===String(id);});
    var ns=d&&d.pago?(+ST.cfg.saldoCaixa||0)+(+d.valor):+ST.cfg.saldoCaixa||0;
    var ps=[fbDel("desp/"+id)];
    if(d&&d.pago)ps.push(fbUpd("cfg",{saldoCaixa:ns}));
    Promise.all(ps).then(function(){ST.modal=null;toast("Despesa removida");});
  }};pintar();
}

// ── RENDER ────────────────────────────────────────────
function pintar(){
  var el=document.getElementById("app");if(!el)return;
  if(ST.loading){el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:14px"><div style="font-size:48px">🏢</div><div style="color:#64748b;font-weight:600;font-size:16px">Conectando...</div></div>';return;}
  if(!ST.user){el.innerHTML=telaLogin();return;}
  el.innerHTML=rToast()+rVoltar()+'<div style="padding-bottom:76px">'+renderTela()+'</div>'+rNav()+rModal();
}

function rToast(){
  if(!ST.toast)return"";
  return'<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);background:'+(ST.toast.tipo==="err"?"#ef4444":"#1e293b")+';color:#fff;border-radius:24px;padding:10px 22px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;pointer-events:none">'+ST.toast.msg+'</div>';
}
function rVoltar(){
  if(ST.tela!=="apt_d"&&ST.tela!=="mes_d")return"";
  return'<button onclick="voltar()" style="position:fixed;top:14px;left:14px;z-index:80;background:#fff;border:none;border-radius:20px;padding:7px 16px 7px 10px;font-size:14px;font-weight:700;color:#1e293b;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.15)">‹ Voltar</button>';
}
function rNav(){
  var ac=ST.tela==="apt_d"?"apts":ST.tela==="mes_d"?"meses":ST.tela;
  var itens=[["home","🏠","Início"],["apts","🚪","Apts"],["meses","📅","Meses"],["desp","💰","Gastos"],["cfg","⚙️","Config"]];
  var html='<div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1.5px solid #e2e8f0;display:flex;z-index:70;padding-bottom:env(safe-area-inset-bottom,0)">';
  itens.forEach(function(n){
    var id=n[0],e=n[1],l=n[2],active=ac===id;
    html+='<button onclick="irPara(\''+id+'\')" style="flex:1;background:none;border:none;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer"><span style="font-size:20px">'+e+'</span><span style="font-size:10px;font-weight:'+(active?700:500)+';color:'+(active?"#2563eb":"#94a3b8")+'">'+l+'</span>'+(active?'<div style="width:4px;height:4px;background:#2563eb;border-radius:99px"></div>':'')+'</button>';
  });
  return html+'</div>';
}
function rModal(){
  if(!ST.modal)return"";
  if(ST.modal.tipo==="saldo"){
    return'<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px"><div style="background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px"><div style="font-size:28px;text-align:center;margin-bottom:8px">💰</div><div style="font-weight:800;font-size:16px;color:#1e293b;margin-bottom:4px;text-align:center">Ajustar Saldo em Caixa</div><div style="color:#64748b;font-size:13px;margin-bottom:16px;text-align:center">Atual: <b>R$ '+fmt(ST.cfg.saldoCaixa)+'</b></div><label style="'+LBL()+'">NOVO SALDO (R$)</label><input id="mvs" type="number" min="0" step="0.01" style="'+I()+'margin-bottom:16px" value="'+(+ST.cfg.saldoCaixa||0)+'"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><button onclick="fecharModal()" style="'+BTN("#e2e8f0","#64748b")+'">Cancelar</button><button onclick="salvarSaldo()" style="'+BTN("#2563eb")+'">Salvar</button></div></div></div>';
  }
  return'<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px"><div style="background:#fff;border-radius:20px;padding:24px;width:100%;max-width:340px"><div style="font-size:28px;text-align:center;margin-bottom:8px">⚠️</div><div style="font-weight:800;font-size:16px;color:#1e293b;margin-bottom:8px;text-align:center">'+ST.modal.titulo+'</div><div style="color:#64748b;font-size:14px;margin-bottom:20px;text-align:center">'+ST.modal.msg+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><button onclick="fecharModal()" style="'+BTN("#e2e8f0","#64748b")+'">Cancelar</button><button onclick="executarModal()" style="'+BTN(ST.modal.cor||"#ef4444")+'">'+ST.modal.label+'</button></div></div></div>';
}
function renderTela(){
  if(ST.tela==="home")return telaHome();
  if(ST.tela==="apts")return telaApts();
  if(ST.tela==="apt_d")return telaAptD();
  if(ST.tela==="meses")return telaMeses();
  if(ST.tela==="mes_d")return telaMesD();
  if(ST.tela==="desp")return telaDesp();
  if(ST.tela==="cfg")return telaCfg();
  return telaHome();
}

// ── LOGIN ─────────────────────────────────────────────
function telaLogin(){

  fil.forEach(function(d){
    var cc=CATC[d.cat]||"#94a3b8";
    html+='<div style="'+CARD()+'"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px"><div style="flex:1;margin-right:10px"><div style="font-weight:700;color:#1e293b;font-size:14px">'+d.desc+'</div><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"><span style="'+BADGE(cc+"22",cc)+'">'+(CATS[d.cat]||d.cat)+'</span><span style="'+BADGE("#f1f5f9","#64748b")+'">'+d.mes+'</span>'+(d.data?'<span style="'+BADGE("#f1f5f9","#64748b")+'>📅 '+d.data+'</span>':"")+'</div>'+(d.obs?'<div style="font-size:12px;color:#94a3b8;margin-top:5px">📝 '+d.obs+'</div>':'')+'</div><div style="text-align:right;flex-shrink:0"><div style="font-weight:800;color:#1e293b;font-size:15px">R$ '+fmt(d.valor)+'</div><button onclick="pagarDesp(\''+d.id+'\')" style="margin-top:6px;background:'+(d.pago?"#dcfce7":"#fee2e2")+';color:'+(d.pago?"#16a34a":"#dc2626")+';border:none;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer">'+(d.pago?"✓ Pago":"Pendente")+'</button></div></div><div style="display:flex;gap:8px"><button onclick="editarDesp(\''+d.id+'\')" style="flex:1;background:#f1f5f9;color:#374151;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:600;cursor:pointer">✏️ Editar</button><button onclick="confirmarDelDesp(\''+d.id+'\')" style="flex:1;background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px;font-size:12px;font-weight:600;cursor:pointer">🗑 Excluir</button></div></div>';
  });
  return html+'</div></div>';
}

// ── CONFIG ────────────────────────────────────────────
function telaCfg(){
  var tab=ST.cfgTab;
  var TABS=[["geral","⚙️ Geral"],["taxas","💲 Taxa"],["apts","🚪 Apts"],["usuarios","👤 Usuários"],["dados","🗂 Dados"]];
  var html='<div class="fade" style="padding:0 0 20px"><div style="background:linear-gradient(135deg,#1e293b,#334155);padding:20px 16px 24px;border-radius:0 0 24px 24px;margin-bottom:16px"><div style="color:#94a3b8;font-size:11px;font-weight:700;letter-spacing:1px">CONFIGURAÇÕES</div><div style="color:#fff;font-size:20px;font-weight:900">Sistema</div></div>';
  html+='<div style="display:flex;gap:6px;overflow-x:auto;padding:0 16px 12px">';
  TABS.forEach(function(t){html+='<button onclick="mudarCfgTab(\''+t[0]+'\')" style="background:'+(tab===t[0]?"#1e293b":"#f1f5f9")+';color:'+(tab===t[0]?"#fff":"#374151")+';border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0">'+t[1]+'</button>';});
  html+='</div><div style="padding:0 16px">';
  if(tab==="geral"){
    html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">NOME DO CONDOMÍNIO</label><input id="cn" style="'+I()+'" value="'+(ST.cfg.nomeCondominio||"")+'" placeholder="Ex: Residencial das Flores"></div>';
    html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">ENDEREÇO</label><input id="ce" style="'+I()+'" value="'+(ST.cfg.endereco||"")+'" placeholder="Ex: Rua das Acácias, 123"></div>';
    html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">ANO</label><input id="ca" type="number" style="'+I()+'" value="'+(ST.cfg.ano||2025)+'"></div>';
    html+='<button onclick="salvarCfgGeral()" style="'+BTN("#1e293b")+'">Salvar Configurações</button>';
  }
  if(tab==="taxas"){
    html+='<div style="'+CARD("#bfdbfe","#eff6ff")+'margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:#1e3a5f">💡 Taxa mensal por apartamento. Ao marcar pagamento o valor é somado ao saldo automaticamente.</div></div>';
    html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">TAXA MENSAL POR APARTAMENTO (R$)</label><input id="ct" type="number" min="0" step="0.01" style="'+I()+'" value="'+(ST.cfg.taxaMensal||50)+'"></div>';
    html+='<div style="'+CARD("#bbf7d0","#f0fdf4")+'margin-bottom:16px"><div style="color:#64748b;font-size:12px">Por apartamento/mês:</div><div style="font-weight:900;font-size:28px;color:#16a34a">R$ '+fmt(ST.cfg.taxaMensal||50)+'</div><div style="color:#64748b;font-size:12px;margin-top:4px">Potencial anual ('+ST.apts.length+' apts): <b>R$ '+fmt((+ST.cfg.taxaMensal||50)*ST.apts.length*12)+'</b></div></div>';
    html+='<button onclick="salvarTaxa()" style="'+BTN("#16a34a")+'">Salvar Taxa</button>';
  }
  if(tab==="apts"){
    if(ST.aptEditId){
      var a=aptById(ST.aptEditId);
      if(a){
        html+='<div style="'+CARD("#bfdbfe","#eff6ff")+'"><div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando Apt '+a.numero+'</div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">NÚMERO</label><input id="ean" style="'+I()+'" value="'+a.numero+'"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">MORADOR</label><input id="eam" style="'+I()+'" value="'+(a.morador||"")+'"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">TELEFONE</label><input id="eat" style="'+I()+'" value="'+(a.telefone||"")+'"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">E-MAIL</label><input id="eae" style="'+I()+'" value="'+(a.email||"")+'"></div>';
        html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px"><button onclick="cancelarEditApt()" style="'+BTN("#e2e8f0","#64748b")+'">Cancelar</button><button onclick="salvarEditApt()" style="'+BTN("#2563eb")+'">Salvar</button></div></div>';
      }
    } else {
      ST.apts.forEach(function(a){
        html+='<div style="'+CARD()+'"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:800;color:#1e293b;font-size:15px">Apt '+a.numero+'</div><div style="font-size:13px;color:'+(a.morador?"#374151":"#cbd5e1")+';font-style:'+(a.morador?"normal":"italic")+'">'+(a.morador||"Sem morador")+'</div>'+(a.telefone?'<div style="font-size:12px;color:#64748b">'+a.telefone+'</div>':'')+'</div><div style="display:flex;gap:6px"><button onclick="abrirEditApt(\''+a.id+'\')" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer">✏️</button><button onclick="confirmarRemoverApt(\''+a.id+'\')" style="background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer">🗑</button></div></div></div>';
      });
      if(!ST.apts.length)html+='<div style="text-align:center;color:#94a3b8;padding:24px">Nenhum apartamento.</div>';
    }
  }
  if(tab==="usuarios"){
    if(ST.userEditId){
      var u=userById(ST.userEditId);
      if(u){
        html+='<div style="'+CARD("#ddd6fe","#faf5ff")+'"><div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando: '+u.nome+'</div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">NOME</label><input id="eun" style="'+I()+'" value="'+u.nome+'"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">LOGIN</label><input id="eul" style="'+I()+'" value="'+u.login+'" autocapitalize="none"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">SENHA</label><input id="eus" type="password" style="'+I()+'" value="'+u.senha+'"></div>';
        html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">FUNÇÃO</label><select id="eur" style="'+SEL()+'"><option value="sindico"'+(u.role==="sindico"?" selected":"")+'>Síndico</option><option value="subsindico"'+(u.role==="subsindico"?" selected":"")+'>Subsíndico</option></select></div>';
        html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button onclick="cancelarEditUser()" style="'+BTN("#e2e8f0","#64748b")+'">Cancelar</button><button onclick="salvarEditUser()" style="'+BTN("#7c3aed")+'">Salvar</button></div></div>';
      }
    } else {
      ST.users.forEach(function(u){
        html+='<div style="'+CARD()+'"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:800;color:#1e293b">'+u.nome+'</div><div style="font-size:12px;color:#64748b">Login: <b>'+u.login+'</b> · '+(u.role==="sindico"?"Síndico":"Subsíndico")+'</div></div><button onclick="abrirEditUser('+u.id+')" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer">✏️ Editar</button></div></div>';
      });
    }
  }
  if(tab==="dados"){
    html+='<div style="'+CARD("#bbf7d0","#f0fdf4")+'margin-bottom:12px"><div style="font-weight:700;color:#065f46;margin-bottom:4px">🔄 Sincronização em tempo real</div><div style="font-size:13px;color:#047857">Dados sincronizados entre todos os dispositivos via Firebase.</div></div>';
    html+='<div style="'+CARD()+'margin-bottom:12px"><div style="font-weight:700;color:#1e293b;margin-bottom:4px">🚪 Sair do sistema</div><div style="font-size:13px;color:#64748b;margin-bottom:12px">Encerra a sessão atual.</div><button onclick="sair()" style="'+BTN("#475569")+'">Sair do Sistema</button></div>';
    html+='<div style="'+CARD("#fecaca","#fff5f5")+'"><div style="font-weight:700;color:#991b1b;margin-bottom:4px">⚠️ Zerar Dados</div><div style="font-size:13px;color:#7f1d1d;margin-bottom:12px">Remove pagamentos, despesas e zera o saldo.</div><button onclick="confirmarReset()" style="'+BTN("#ef4444")+'">Zerar Dados</button></div>';
  }
  return html+'</div></div>';
}
</script>
</body>
</html>
