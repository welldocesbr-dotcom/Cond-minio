<script>
firebase.initializeApp({
  apiKey:"AIzaSyDKqdGqPDHpbeOjChWjxg453g9xUNo_bZE",
  authDomain:"cond-ce038.firebaseapp.com",
  databaseURL:"https://cond-ce038-default-rtdb.firebaseio.com",
  projectId:"cond-ce038",

  messagingSenderId:"797254652697",

var db=firebase.database();
function fbSet(p,v){return db.ref(p).set(v);}
function fbUpd(p,v){return db.ref(p).update(v);}
function fbDel(p){return db.ref(p).remove();}
function fbOn(p,cb){db.ref(p).on("value",function(s){cb(s.val());});}
function fbGet(p){return db.ref(p).once("value");}

var ANO_ATUAL=new Date().getFullYear();
var MO=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
var MF=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
var CATS={luz:"⚡ Luz",agua:"💧 Água",manutencao:"🔧 Manutenção",limpeza:"🧹 Limpeza",seguranca:"🔒 Segurança",outros:"📦 Outros"};
var CATC={luz:"#eab308",agua:"#06b6d4",manutencao:"#10b981",limpeza:"#3b82f6",seguranca:"#8b5cf6",outros:"#94a3b8"};

var ST={
  tela:"home",user:null,users:[],
  cfg:{nomeCondominio:"",endereco:"",ano:ANO_ATUAL,taxaMensal:50,saldoCaixa:0,blocos:false},
  blocos:[],apts:[],pay:{},desp:[],avisos:[],
  loading:true,toast:null,modal:null,
  aptForm:null,despForm:null,despEditId:null,
  avisoForm:null,
  cfgTab:"geral",aptEditId:null,userEditId:null,blocoEditId:null,
  selAptId:null,selMes:null,selAno:ANO_ATUAL,
  despFiltro:"Todos",avisoFiltro:"todos"
};

// ── HELPERS ───────────────────────────────────────────
function fmt(n){return(+n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function hoje(){var d=new Date();return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function pad(n){return n<10?"0"+n:String(n);}
function isoToBr(s){if(!s)return"";var p=s.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function brToIso(s){if(!s)return"";var p=s.split("/");return p[2]+"-"+p[1]+"-"+p[0];}
function mesDoIso(s){if(!s)return MO[new Date().getMonth()];return MO[parseInt(s.split("-")[1])-1]||MO[new Date().getMonth()];}
function gval(id){var el=document.getElementById(id);return el?el.value:"";}
function aptById(id){return ST.apts.find(function(a){return a.id===id;})||null;}
function userById(id){return ST.users.find(function(u){return u.id===id;})||null;}
function blocoById(id){return ST.blocos.find(function(b){return b.id===id;})||null;}
function nomeBloco(id){var b=blocoById(id);return b?b.nome:"";}

function pctApt(id,ano){
  var a=ano||ST.selAno;
  var p=0;MO.forEach(function(m){if(ST.pay[a]&&ST.pay[a][id]&&ST.pay[a][id][m]&&ST.pay[a][id][m].pago)p++;});
  return Math.round(p/12*100);
}
function pctMes(m,ano){
  var a=ano||ST.selAno;
  var ac=ST.apts;if(!ac.length)return 0;
  return Math.round(ac.filter(function(x){return ST.pay[a]&&ST.pay[a][x.id]&&ST.pay[a][x.id][m]&&ST.pay[a][x.id][m].pago;}).length/ac.length*100);
}
function totalArr(ano){
  var a=ano||ST.selAno;var t=0;var tx=+ST.cfg.taxaMensal||0;
  ST.apts.forEach(function(x){MO.forEach(function(m){if(ST.pay[a]&&ST.pay[a][x.id]&&ST.pay[a][x.id][m]&&ST.pay[a][x.id][m].pago)t+=tx;});});
  return t;
}
function totalDespPagas(){return ST.desp.filter(function(d){return d.pago&&String(d.ano||ANO_ATUAL)===String(ST.selAno);}).reduce(function(s,d){return s+(+d.valor||0);},0);}

// ── TOAST ─────────────────────────────────────────────
var _tt;
function toast(msg,tipo){clearTimeout(_tt);ST.toast={msg:msg,tipo:tipo||"ok"};pintar();_tt=setTimeout(function(){ST.toast=null;pintar();},2500);}

// ── CSS ───────────────────────────────────────────────
function I(extra){return"width:100%;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 14px;font-size:14px;background:#fff;color:#1e293b;box-sizing:border-box;"+(extra||"");}
function BTN(bg,c,w){return"background:"+(bg||"#2563eb")+";color:"+(c||"#fff")+";border:none;border-radius:13px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;width:"+(w||"100%")+";";}
function CARD(b,bg){return"background:"+(bg||"#fff")+";border:1.5px solid "+(b||"#e2e8f0")+";border-radius:16px;padding:14px;margin-bottom:10px;";}
function LBL(){return"font-size:11px;font-weight:700;color:#64748b;letter-spacing:.8px;margin-bottom:5px;display:block;";}
function BADGE(bg,c){return"background:"+bg+";color:"+c+";font-size:10px;font-weight:700;border-radius:20px;padding:3px 9px;display:inline-block;";}
function SEL(){return I()+"padding:12px 28px 12px 14px;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 12 12%22%3E%3Cpath fill=%22%2364748b%22 d=%22M6 8L1 3h10z%22/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center;";}

// ── INIT ──────────────────────────────────────────────
fbGet("_v2init").then(function(snap){
  if(!snap.exists()){
    var uo={1:{id:1,nome:"Síndico",login:"sindico",senha:"1234",role:"sindico"},2:{id:2,nome:"Subsíndico",login:"subsindico",senha:"1234",role:"subsindico"}};
    var ao={};["101","102","103","104","105","106"].forEach(function(n){ao[n]={id:n,numero:n,morador:"",telefone:"",email:"",blocoId:"",ativo:true};});
    var po={};po[ANO_ATUAL]={};["101","102","103","104","105","106"].forEach(function(n){po[ANO_ATUAL][n]={};MO.forEach(function(m){po[ANO_ATUAL][n][m]={pago:false,data:""};});});
    return Promise.all([fbSet("users",uo),fbSet("cfg",{nomeCondominio:"",endereco:"",ano:ANO_ATUAL,taxaMensal:50,saldoCaixa:0,blocos:false}),fbSet("apts",ao),fbSet("pay",po),fbSet("_v2init",true)]);
  }
}).then(function(){
  try{var s=sessionStorage.getItem("cu");if(s)ST.user=JSON.parse(s);}catch(e){}
  fbOn("users",function(v){ST.users=v?Object.values(v):[];pintar();});
  fbOn("cfg",function(v){if(v)ST.cfg=Object.assign({nomeCondominio:"",endereco:"",ano:ANO_ATUAL,taxaMensal:50,saldoCaixa:0,blocos:false},v);pintar();});
  fbOn("blocos",function(v){ST.blocos=v?Object.values(v):[];pintar();});
  fbOn("apts",function(v){ST.apts=v?Object.values(v).filter(function(a){return a.ativo;}):[];pintar();});
  fbOn("pay",function(v){ST.pay=v||{};pintar();});
  fbOn("desp",function(v){ST.desp=v?Object.values(v).sort(function(a,b){return b.id-a.id;}):[];pintar();});
  fbOn("avisos",function(v){ST.avisos=v?Object.values(v).sort(function(a,b){return b.id-a.id;}):[];pintar();});
  ST.loading=false;pintar();
}).catch(function(e){console.error(e);ST.loading=false;pintar();});

// ── AÇÕES ─────────────────────────────────────────────
function irPara(t){ST.tela=t;ST.aptForm=null;ST.despForm=null;ST.despEditId=null;ST.avisoForm=null;pintar();}
function voltar(){
  if(ST.tela==="apt_d")ST.tela="apts";
  else if(ST.tela==="mes_d")ST.tela="meses";
  else ST.tela="home";
  pintar();
}
function sair(){try{sessionStorage.removeItem("cu");}catch(e){}ST.user=null;ST.tela="home";pintar();}

function fazerLogin(){
  var u=gval("fu").trim(),s=gval("fs");
  var found=ST.users.find(function(x){return x.login===u&&x.senha===s;});
  if(found){ST.user=found;try{sessionStorage.setItem("cu",JSON.stringify(found));}catch(e){}ST.tela="home";pintar();toast("Bem-vindo, "+found.nome+"!");}
  else{var e=document.getElementById("ferr");if(e){e.style.display="block";e.textContent="⚠️ Login ou senha incorretos.";}}
}

function marcarPagamento(aptId,mes){
  var ano=ST.selAno;
  var cur=(ST.pay[ano]&&ST.pay[ano][aptId]&&ST.pay[ano][aptId][mes]&&ST.pay[ano][aptId][mes].pago)||false;
  var tx=+ST.cfg.taxaMensal||0;
  var ns=(+ST.cfg.saldoCaixa||0)+(!cur?tx:-tx);
  fbUpd("pay/"+ano+"/"+aptId+"/"+mes,{pago:!cur,data:!cur?hoje():""}).then(function(){return fbUpd("cfg",{saldoCaixa:ns});}).then(function(){toast(!cur?"✅ Pago! Saldo atualizado.":"Pagamento desmarcado");});
}

function abrirApt(id){ST.selAptId=id;ST.tela="apt_d";pintar();}
function abrirMes(i){ST.selMes=i;ST.tela="mes_d";pintar();}

function whatsappInadimp(apt,mes){
  var tx=fmt(ST.cfg.taxaMensal||50);
  var msg="Olá "+apt.morador+"! Informamos que a taxa de condomínio de *"+MF[mes]+"* no valor de *R$ "+tx+"* referente ao Apt "+apt.numero+" está em aberto. Por favor, entre em contato para regularizar. "+ST.cfg.nomeCondominio;
  var tel=apt.telefone?apt.telefone.replace(/\D/g,""):"";
  var url="https://wa.me/55"+tel+"?text="+encodeURIComponent(msg);
  window.open(url,"_blank");
}

function toggleFormApt(){ST.aptForm=ST.aptForm?null:{};pintar();}
function cancelarFormApt(){ST.aptForm=null;pintar();}
function salvarNovoApt(){
  var n=gval("an").trim();
  if(!n){toast("Informe o número","err");return;}
  if(ST.apts.find(function(a){return a.id===n;})){toast("Já existe","err");return;}
  var blocoId=gval("abk")||"";
  var novo={id:n,numero:n,morador:gval("am"),telefone:gval("at"),email:gval("ae"),blocoId:blocoId,ativo:true};
  var po={};MO.forEach(function(m){po[m]={pago:false,data:""};});
  // init pay for all years if needed
  var payUpd={};
  payUpd["pay/"+ST.selAno+"/"+n]=po;
  Promise.all([fbSet("apts/"+n,novo),db.ref().update(payUpd)]).then(function(){ST.aptForm=null;toast("Apt "+n+" adicionado!");});
}

function abrirEditApt(id){ST.aptEditId=id;ST.cfgTab="apts";pintar();}
function cancelarEditApt(){ST.aptEditId=null;pintar();}
function salvarEditApt(){
  var a=aptById(ST.aptEditId);if(!a)return;
  var upd=Object.assign({},a,{numero:gval("ean")||a.numero,morador:gval("eam"),telefone:gval("eat"),email:gval("eae"),blocoId:gval("eabk")||""});
  fbSet("apts/"+upd.id,upd).then(function(){ST.aptEditId=null;toast("✓ Apartamento salvo!");});
}
function confirmarRemoverApt(id){
  var a=aptById(id);if(!a)return;
  ST.modal={titulo:"Remover Apt "+a.numero+"?",msg:"Os pagamentos também serão removidos.",cor:"#ef4444",label:"Remover",fn:function(){
    fbUpd("apts/"+id,{ativo:false}).then(function(){ST.modal=null;toast("Apartamento removido");});
  }};pintar();
}

// BLOCOS
function salvarBloco(){
  var nome=gval("bnome").trim();
  if(!nome){toast("Informe o nome do bloco","err");return;}
  if(ST.blocoEditId){
    fbSet("blocos/"+ST.blocoEditId,{id:ST.blocoEditId,nome:nome}).then(function(){ST.blocoEditId=null;toast("✓ Bloco salvo!");pintar();});
  } else {
    var id="bloco_"+Date.now();
    fbSet("blocos/"+id,{id:id,nome:nome}).then(function(){toast("Bloco "+nome+" adicionado!");pintar();});
  }
}
function editarBloco(id){ST.blocoEditId=id;pintar();}
function cancelarBloco(){ST.blocoEditId=null;pintar();}
function removerBloco(id){
  fbDel("blocos/"+id).then(function(){toast("Bloco removido");});
}

// USUÁRIOS
function abrirEditUser(id){ST.userEditId=id;ST.cfgTab="usuarios";pintar();}
function cancelarEditUser(){ST.userEditId=null;pintar();}
function salvarEditUser(){
  var u=userById(ST.userEditId);if(!u)return;
  var nome=gval("eun"),login=gval("eul"),senha=gval("eus"),role=gval("eur");
  if(!nome||!login||!senha){toast("Preencha todos os campos","err");return;}
  var upd=Object.assign({},u,{nome:nome,login:login,senha:senha,role:role});
  fbSet("users/"+u.id,upd).then(function(){
    if(ST.user&&ST.user.id===u.id){ST.user=upd;try{sessionStorage.setItem("cu",JSON.stringify(upd));}catch(e){}}
    ST.userEditId=null;toast("✓ Usuário salvo!");
  });
}

function mudarCfgTab(t){ST.cfgTab=t;ST.aptEditId=null;ST.userEditId=null;ST.blocoEditId=null;pintar();}

function salvarCfgGeral(){
  var usaBlocos=document.getElementById("cblocos")&&document.getElementById("cblocos").checked;
  var upd=Object.assign({},ST.cfg,{nomeCondominio:gval("cn"),endereco:gval("ce"),ano:parseInt(gval("ca"))||ANO_ATUAL,blocos:usaBlocos});
  fbSet("cfg",upd).then(function(){toast("✓ Configurações salvas!");});
}
function salvarTaxa(){
  var tx=parseFloat(gval("ct"))||50;
  fbUpd("cfg",{taxaMensal:tx}).then(function(){toast("✓ Taxa salva!");});
}
function abrirAjusteSaldo(){ST.modal={tipo:"saldo"};pintar();}
function salvarSaldo(){
  var v=parseFloat(gval("mvs"))||0;
  fbUpd("cfg",{saldoCaixa:v}).then(function(){ST.modal=null;toast("✓ Saldo atualizado!");});
}
function fecharModal(){ST.modal=null;pintar();}
function executarModal(){if(ST.modal&&ST.modal.fn)ST.modal.fn();}

function novoAno(){
  var novoA=ST.selAno+1;
  var po={};ST.apts.forEach(function(a){po[a.id]={};MO.forEach(function(m){po[a.id][m]={pago:false,data:""};});});
  fbSet("pay/"+novoA,po).then(function(){ST.selAno=novoA;toast("Ano "+novoA+" iniciado!");pintar();});
}
function mudarAno(a){ST.selAno=parseInt(a);pintar();}

function confirmarReset(){
  ST.modal={titulo:"Zerar dados do ano "+ST.selAno+"?",msg:"Pagamentos e despesas deste ano serão apagados.",cor:"#ef4444",label:"Zerar",fn:function(){
    var po={};ST.apts.forEach(function(a){po[a.id]={};MO.forEach(function(m){po[a.id][m]={pago:false,data:""};});});
    var despAno=ST.desp.filter(function(d){return String(d.ano||ANO_ATUAL)===String(ST.selAno);});
    var ps=[fbSet("pay/"+ST.selAno,po)];
    despAno.forEach(function(d){ps.push(fbDel("desp/"+d.id));});
    Promise.all(ps).then(function(){ST.modal=null;toast("Dados zerados!");});
  }};pintar();
}

// DESPESAS
function setDespFiltro(m){ST.despFiltro=m;pintar();}
function toggleFormDesp(){
  if(ST.despForm){ST.despForm=null;ST.despEditId=null;}
  else{ST.despForm={desc:"",valor:"",data:hoje(),cat:"luz",obs:""};ST.despEditId=null;}
  pintar();
}
function cancelarFormDesp(){ST.despForm=null;ST.despEditId=null;pintar();}
function salvarDesp(){
  var desc=gval("dd").trim(),val=gval("dv");
  if(!desc||!val){toast("Preencha descrição e valor","err");return;}
  var dtISO=gval("ddt");
  var dt=isoToBr(dtISO)||hoje();
  var mes=mesDoIso(dtISO);
  var f={desc:desc,valor:parseFloat(val),data:dt,mes:mes,cat:gval("dc")||"luz",obs:gval("dob")||"",ano:ST.selAno,pago:false};
  if(ST.despEditId){
    var eid=ST.despEditId;
    var old=ST.desp.find(function(d){return String(d.id)===String(eid);});
    var ns=+ST.cfg.saldoCaixa||0;
    if(old&&old.pago){ns+=+old.valor;ns-=f.valor;}
    var p2=[fbUpd("desp/"+eid,f)];
    if(old&&old.pago)p2.push(fbUpd("cfg",{saldoCaixa:ns}));
    Promise.all(p2).then(function(){ST.despForm=null;ST.despEditId=null;toast("✓ Atualizada!");});
  }else{
    var id=Date.now();
    fbSet("desp/"+id,Object.assign({},f,{id:id})).then(function(){ST.despForm=null;toast("Despesa adicionada!");});
  }
}
function editarDesp(id){
  var d=ST.desp.find(function(x){return String(x.id)===String(id);});if(!d)return;
  ST.despEditId=id;ST.despForm={desc:d.desc,valor:String(d.valor),data:d.data||hoje(),cat:d.cat,obs:d.obs||""};pintar();
}
function pagarDesp(id){
  var d=ST.desp.find(function(x){return String(x.id)===String(id);});if(!d)return;
  var ns=(+ST.cfg.saldoCaixa||0)+(d.pago?+d.valor:-(+d.valor));
  Promise.all([fbUpd("desp/"+id,{pago:!d.pago}),fbUpd("cfg",{saldoCaixa:ns})]).then(function(){toast(d.pago?"Desmarcada":"💸 Pago! Saldo atualizado.");});
}
function confirmarDelDesp(id){
  ST.modal={titulo:"Excluir despesa?",msg:"Não pode ser desfeito.",cor:"#ef4444",label:"Excluir",fn:function(){
    var d=ST.desp.find(function(x){return String(x.id)===String(id);});
    var ns=d&&d.pago?(+ST.cfg.saldoCaixa||0)+(+d.valor):+ST.cfg.saldoCaixa||0;
    var ps=[fbDel("desp/"+id)];
    if(d&&d.pago)ps.push(fbUpd("cfg",{saldoCaixa:ns}));
    Promise.all(ps).then(function(){ST.modal=null;toast("Removida");});
  }};pintar();
}

// AVISOS
function setAvisoFiltro(f){ST.avisoFiltro=f;pintar();}
function toggleFormAviso(){ST.avisoForm=ST.avisoForm?null:{titulo:"",texto:"",tipo:"info"};pintar();}
function cancelarAviso(){ST.avisoForm=null;pintar();}
function salvarAviso(){
  var titulo=gval("ati").trim(),texto=gval("atx").trim();
  if(!titulo||!texto){toast("Preencha título e texto","err");return;}
  var id=Date.now();
  fbSet("avisos/"+id,{id:id,titulo:titulo,texto:texto,tipo:gval("atp")||"info",data:hoje(),autor:ST.user?ST.user.nome:"",lidos:{}}).then(function(){ST.avisoForm=null;toast("✓ Aviso publicado!");});
}
function marcarLido(id){
  if(!ST.user)return;
  fbUpd("avisos/"+id+"/lidos",{[ST.user.id]:true});
}
function confirmarDelAviso(id){
  ST.modal={titulo:"Excluir aviso?",msg:"O aviso será removido para todos.",cor:"#ef4444",label:"Excluir",fn:function(){fbDel("avisos/"+id).then(function(){ST.modal=null;toast("Aviso removido");});}};pintar();
}

// PDF
function gerarPDF(){
  try{
    var doc=new window.jspdf.jsPDF();
    var arr=totalArr();
    var despAno=ST.desp.filter(function(d){return String(d.ano||ANO_ATUAL)===String(ST.selAno);});
    var despPagas=despAno.filter(function(d){return d.pago;}).reduce(function(s,d){return s+(+d.valor||0);},0);
    var y=20;
    doc.setFontSize(18);doc.setFont("helvetica","bold");
    doc.text(ST.cfg.nomeCondominio||"Condomínio",105,y,{align:"center"});
    y+=8;doc.setFontSize(11);doc.setFont("helvetica","normal");
    doc.text("Relatório Financeiro — Ano "+ST.selAno,105,y,{align:"center"});
    y+=6;doc.text(ST.cfg.endereco||"",105,y,{align:"center"});
    y+=10;doc.setDrawColor(200);doc.line(15,y,195,y);y+=8;
    doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text("Resumo Geral",15,y);y+=8;
    doc.setFontSize(11);doc.setFont("helvetica","normal");
    doc.text("Total arrecadado: R$ "+fmt(arr),15,y);y+=6;
    doc.text("Total despesas pagas: R$ "+fmt(despPagas),15,y);y+=6;

  if(tab==="geral"){
    html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">NOME DO CONDOMÍNIO</label><input id="cn" style="'+I()+'" value="'+(ST.cfg.nomeCondominio||"")+'" placeholder="Ex: Residencial das Flores"></div>';
    html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">ENDEREÇO</label><input id="ce" style="'+I()+'" value="'+(ST.cfg.endereco||"")+'" placeholder="Ex: Rua das Acácias, 123"></div>';
    html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">ANO ATUAL</label><input id="ca" type="number" style="'+I()+'" value="'+(ST.cfg.ano||ANO_ATUAL)+'"></div>';
    html+='<div style="margin-bottom:20px;display:flex;align-items:center;gap:12px;'+CARD()+'"><input type="checkbox" id="cblocos" style="width:18px;height:18px;cursor:pointer"'+(ST.cfg.blocos?" checked":"")+' onchange="document.getElementById(\'cblocos\').checked"><div><div style="font-weight:700;color:#1e293b">Usar Blocos</div><div style="font-size:12px;color:#64748b">Organizar apartamentos em blocos (A, B, C...)</div></div></div>';
    html+='<button onclick="salvarCfgGeral()" style="'+BTN("#1e293b")+'">Salvar Configurações</button>';
  }

  if(tab==="taxas"){
    html+='<div style="'+CARD("#bfdbfe","#eff6ff")+'margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:#1e3a5f">💡 Taxa mensal cobrada por apartamento. Ao marcar como pago, o valor é somado ao saldo automaticamente.</div></div>';
    html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">TAXA MENSAL POR APARTAMENTO (R$)</label><input id="ct" type="number" min="0" step="0.01" style="'+I()+'" value="'+(ST.cfg.taxaMensal||50)+'"></div>';
    html+='<div style="'+CARD("#bbf7d0","#f0fdf4")+'margin-bottom:16px"><div style="color:#64748b;font-size:12px">Por apartamento/mês:</div><div style="font-weight:900;font-size:28px;color:#16a34a">R$ '+fmt(ST.cfg.taxaMensal||50)+'</div><div style="color:#64748b;font-size:12px;margin-top:4px">Potencial anual ('+ST.apts.length+' apts): <b>R$ '+fmt((+ST.cfg.taxaMensal||50)*ST.apts.length*12)+'</b></div></div>';
    html+='<button onclick="salvarTaxa()" style="'+BTN("#16a34a")+'">Salvar Taxa</button>';
  }

  if(tab==="blocos"){
    html+='<div style="'+CARD("#bfdbfe","#eff6ff")+'margin-bottom:16px"><div style="font-size:13px;font-weight:600;color:#1e3a5f">🏗 Configure os blocos do condomínio. Ative a opção "Usar Blocos" em Geral para habilitá-los.</div></div>';
    if(ST.blocoEditId){
      var b=blocoById(ST.blocoEditId)||{};
      html+='<div style="'+CARD("#bfdbfe","#eff6ff")+'"><div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando bloco</div><div style="margin-bottom:12px"><label style="'+LBL()+'">NOME DO BLOCO</label><input id="bnome" style="'+I()+'" value="'+(b.nome||"")+'"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button onclick="cancelarBloco()" style="'+BTN("#e2e8f0","#64748b")+'">Cancelar</button><button onclick="salvarBloco()" style="'+BTN("#2563eb")+'">Salvar</button></div></div>';
    } else {
      html+='<div style="'+CARD("#eff6ff","#eff6ff")+'margin-bottom:12px"><div style="font-weight:700;color:#1e293b;margin-bottom:10px">Novo Bloco</div><div style="margin-bottom:10px"><label style="'+LBL()+'">NOME (ex: Bloco A)</label><input id="bnome" style="'+I()+'" placeholder="Ex: Bloco A"></div><button onclick="salvarBloco()" style="'+BTN("#2563eb")+'">Adicionar Bloco</button></div>';
      if(!ST.blocos.length)html+='<div style="text-align:center;color:#94a3b8;padding:24px">Nenhum bloco cadastrado.</div>';
      ST.blocos.forEach(function(b){html+='<div style="'+CARD()+'"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:800;color:#1e293b">'+b.nome+'</div><div style="display:flex;gap:6px"><button onclick="editarBloco(\''+b.id+'\')" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer">✏️</button><button onclick="removerBloco(\''+b.id+'\')" style="background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer">🗑</button></div></div></div>';});
    }
  }

  if(tab==="apts"){
    if(ST.aptEditId){
      var ae=aptById(ST.aptEditId);
      if(ae){
        var blocoOpts2='<option value="">Sem bloco</option>';
        ST.blocos.forEach(function(b){blocoOpts2+='<option value="'+b.id+'"'+(ae.blocoId===b.id?" selected":"")+'>'+b.nome+'</option>';});
        html+='<div style="'+CARD("#bfdbfe","#eff6ff")+'"><div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando Apt '+ae.numero+'</div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">NÚMERO</label><input id="ean" style="'+I()+'" value="'+ae.numero+'"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">MORADOR</label><input id="eam" style="'+I()+'" value="'+(ae.morador||"")+'"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">TELEFONE</label><input id="eat" style="'+I()+'" value="'+(ae.telefone||"")+'"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">E-MAIL</label><input id="eae" style="'+I()+'" value="'+(ae.email||"")+'"></div>';
        if(ST.cfg.blocos)html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">BLOCO</label><select id="eabk" style="'+SEL()+'">'+blocoOpts2+'</select></div>';
        html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px"><button onclick="cancelarEditApt()" style="'+BTN("#e2e8f0","#64748b")+'">Cancelar</button><button onclick="salvarEditApt()" style="'+BTN("#2563eb")+'">Salvar</button></div></div>';
      }
    } else {
      ST.apts.forEach(function(a){html+='<div style="'+CARD()+'"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:800;color:#1e293b;font-size:15px">Apt '+a.numero+'</div>'+(ST.cfg.blocos&&a.blocoId?'<div style="font-size:11px;color:#2563eb">'+nomeBloco(a.blocoId)+'</div>':'')+'<div style="font-size:13px;color:'+(a.morador?"#374151":"#cbd5e1")+';font-style:'+(a.morador?"normal":"italic")+'">'+(a.morador||"Sem morador")+'</div>'+(a.telefone?'<div style="font-size:12px;color:#64748b">'+a.telefone+'</div>':'')+'</div><div style="display:flex;gap:6px"><button onclick="abrirEditApt(\''+a.id+'\')" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer">✏️</button><button onclick="confirmarRemoverApt(\''+a.id+'\')" style="background:#fef2f2;color:#ef4444;border:none;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer">🗑</button></div></div></div>';});
      if(!ST.apts.length)html+='<div style="text-align:center;color:#94a3b8;padding:24px">Nenhum apartamento.</div>';
    }
  }

  if(tab==="usuarios"){
    if(ST.userEditId){
      var ue=userById(ST.userEditId);
      if(ue){
        html+='<div style="'+CARD("#ddd6fe","#faf5ff")+'"><div style="font-weight:700;color:#1e293b;margin-bottom:12px">Editando: '+ue.nome+'</div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">NOME</label><input id="eun" style="'+I()+'" value="'+ue.nome+'"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">LOGIN</label><input id="eul" style="'+I()+'" value="'+ue.login+'" autocapitalize="none"></div>';
        html+='<div style="margin-bottom:10px"><label style="'+LBL()+'">SENHA</label><input id="eus" type="password" style="'+I()+'" value="'+ue.senha+'"></div>';
        html+='<div style="margin-bottom:14px"><label style="'+LBL()+'">FUNÇÃO</label><select id="eur" style="'+SEL()+'"><option value="sindico"'+(ue.role==="sindico"?" selected":"")+'>Síndico</option><option value="subsindico"'+(ue.role==="subsindico"?" selected":"")+'>Subsíndico</option></select></div>';
        html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button onclick="cancelarEditUser()" style="'+BTN("#e2e8f0","#64748b")+'">Cancelar</button><button onclick="salvarEditUser()" style="'+BTN("#7c3aed")+'">Salvar</button></div></div>';
      }
    } else {
      ST.users.forEach(function(u){html+='<div style="'+CARD()+'"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:800;color:#1e293b">'+u.nome+'</div><div style="font-size:12px;color:#64748b">Login: <b>'+u.login+'</b> · '+(u.role==="sindico"?"Síndico":"Subsíndico")+'</div></div><button onclick="abrirEditUser('+u.id+')" style="background:#eff6ff;color:#2563eb;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer">✏️ Editar</button></div></div>';});
    }
  }

  if(tab==="dados"){
    html+='<div style="'+CARD("#bbf7d0","#f0fdf4")+'margin-bottom:12px"><div style="font-weight:700;color:#065f46;margin-bottom:4px">🔄 Sincronização em tempo real</div><div style="font-size:13px;color:#047857">Dados sincronizados entre todos os dispositivos via Firebase.</div></div>';
    html+='<div style="'+CARD()+'margin-bottom:12px"><div style="font-weight:700;color:#1e293b;margin-bottom:4px">📄 Relatório PDF</div><div style="font-size:13px;color:#64748b;margin-bottom:12px">Gera relatório completo do ano com pagamentos, despesas e inadimplentes.</div><button onclick="gerarPDF()" style="'+BTN("#1e293b")+'">Gerar PDF — '+ST.selAno+'</button></div>';
    html+='<div style="'+CARD()+'margin-bottom:12px"><div style="font-weight:700;color:#1e293b;margin-bottom:4px">🚪 Sair do sistema</div><div style="font-size:13px;color:#64748b;margin-bottom:12px">Encerra a sessão atual.</div><button onclick="sair()" style="'+BTN("#475569")+'">Sair do Sistema</button></div>';
    html+='<div style="'+CARD("#fecaca","#fff5f5")+'"><div style="font-weight:700;color:#991b1b;margin-bottom:4px">⚠️ Zerar Dados do Ano</div><div style="font-size:13px;color:#7f1d1d;margin-bottom:12px">Remove pagamentos e despesas do ano '+ST.selAno+'. Histórico de outros anos é mantido.</div><button onclick="confirmarReset()" style="'+BTN("#ef4444")+'">Zerar Dados de '+ST.selAno+'</button></div>';
  }

  return html+'</div></div>';
}
</script>
</body>
</html>
